packages:
  - 'apps/*'
  - 'docs'
  - 'services/*'
  - 'packages/core/ts'
  - 'packages/identity/ts'
  - 'packages/revocation/ts'
  - 'packages/oauth/ts'
  - 'packages/adminAudit/ts'
  - 'packages/transport/mcp/ts'
  - 'packages/transport/a2a/ts'
  - 'packages/sdk/ts'
  - 'packages/admin/ts'
  - 'packages/engine'
  - 'packages/connectors/express/ts'
  - 'packages/connectors/fastmcp/ts'
  - 'packages/connectors/postgres/ts'
  - 'packages/connectors/redis/ts'
linkWorkspacePackages: true
allowBuilds:
  bun: true
  esbuild: true
  sharp: true
overrides:
  brace-expansion: 5.0.6
  fast-uri: 3.1.2
  devalue: 5.8.1
  qs: 6.15.2
  vite: 7.3.5
  dompurify: 3.4.11
  esbuild: 0.28.1
  js-yaml: 4.2.0
  read-yaml-file: ^2.1.0
  '@opentelemetry/core': 2.8.0
reporter: silent
