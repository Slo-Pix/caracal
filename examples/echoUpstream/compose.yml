#
# Self-contained protected upstream for validating Gateway-to-upstream
# connectivity. The Caracal control plane (gateway, STS, coordinator, redis)
# runs independently via `caracal up`; this compose file only owns the echo
# container and joins the external `caracalData` network so the Gateway can
# reach it by service name.

services:

  echoUpstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: caracal-echo-upstream:latest
    container_name: echoUpstream
    environment:
      ECHO_PORT: "8088"
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8088/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - caracalData

networks:
  caracalData:
    external: true
    name: caracalData
