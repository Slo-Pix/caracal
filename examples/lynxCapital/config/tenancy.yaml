# Caracal, a product of Garudex Labs
#
# Identity model for the Lynx Capital finance-ops swarm: the managed applications that
# partition agents by permission boundary, the twenty partner credential providers in
# their exact Caracal provider format, the per-application resource views the Gateway
# binds, and the role-to-scope grants every spawned agent is narrowed to.
#
# One managed application per permission boundary. The Gateway binds each resource to
# exactly one application, so two applications can never present authority for the same
# resource view; shared partners get one view per application that needs them, each with
# only the scopes that boundary is allowed to hold. Every agent in the swarm runs as its
# own Caracal agent session under its role's application, labeled with its role and
# narrowed by a delegation edge to its role's scopes.

applications:
  - id: "operations"
    applicationName: "lynx-operations"
    description: "Run orchestration: finance-control and the regional/workflow orchestrators. Holds no partner authority except the Relay workflow-automation view used by ad-hoc partner integration."
  - id: "intake"
    applicationName: "lynx-intake"
    description: "Invoice capture and vendor lifecycle: OCR extraction, vendor master data, KYB verification, procurement, and supplier CRM."
  - id: "ledger"
    applicationName: "lynx-ledger"
    description: "Books and records: ERP matching, SMB accounting, general ledger close, and accounts receivable with its dunning notifications."
  - id: "compliance"
    applicationName: "lynx-compliance"
    description: "Screening, transaction monitoring, regulatory filing, tax determination, and the internal directory used for approval chains."
  - id: "treasury"
    applicationName: "lynx-treasury"
    description: "Cash positioning, liquidity, FX rates and conversions, market data, and payment-route optimization."
  - id: "payments"
    applicationName: "lynx-payments"
    description: "Money movement: payout rails, open-banking payments, cross-border settlement, bill payment, and payment notifications."
  - id: "audit"
    applicationName: "lynx-audit"
    description: "Read-only verification of contracts, charges, FX settlements, and financial reports."

# The twenty partner providers, registered with the Caracal control plane in the exact
# config shape each provider kind supports. ${ENV} values resolve from the operator
# environment at provision time; the Gateway holds the credential and the application
# never sees it. `scopes` is the provider's operation vocabulary: every operation maps
# to exactly one scope, and resource views below select scope names from it.
providers:
  - id: "halcyon-bank"
    name: "Halcyon Bank"
    kind: "bearer_token"
    port: 9400
    integrationView: "treasury-halcyon"
    config:
      bearer_token: "${LYNX_PARTNER_HALCYON_BANK_TOKEN}"
    scopes:
      halcyon:read: ["list_accounts", "get_account", "list_transactions", "get_statement"]
      halcyon:pay: ["initiate_payment", "get_payment"]
  - id: "meridian-pay"
    name: "Meridian Pay"
    kind: "api_key"
    port: 9401
    integrationView: "audit-meridian"
    config:
      auth_location: "header"
      header_name: "X-Api-Key"
      api_key: "${LYNX_PARTNER_MERIDIAN_PAY_API_KEY}"
    scopes:
      meridian:payout: ["create_payout", "get_payout", "get_balance"]
      meridian:charge: ["create_charge", "capture_charge", "refund_charge", "submit_dispute_evidence"]
      meridian:read: ["get_charge", "list_charges", "list_disputes", "get_dispute", "list_settlements", "get_settlement", "list_events"]
  - id: "cordoba-fx"
    name: "Cordoba FX"
    kind: "bearer_token"
    port: 9402
    integrationView: "audit-cordoba"
    config:
      bearer_token: "${LYNX_PARTNER_CORDOBA_FX_TOKEN}"
    scopes:
      cordoba:quote: ["get_quote"]
      cordoba:convert: ["create_conversion"]
      cordoba:transfer: ["create_beneficiary", "create_payment"]
      cordoba:read: ["get_conversion", "get_beneficiary", "list_beneficiaries", "get_payment", "list_balances"]
  - id: "ironbark-erp"
    name: "Ironbark ERP"
    kind: "bearer_token"
    port: 9403
    integrationView: "ledger-ironbark"
    config:
      bearer_token: "${LYNX_PARTNER_IRONBARK_ERP_TOKEN}"
    scopes:
      ironbark:read: ["list_vendors", "get_vendor", "list_purchase_orders", "get_purchase_order", "list_bills", "get_bill", "get_journal_entry", "list_journal_entries", "list_accounts", "get_account"]
      ironbark:post: ["match_invoice", "create_purchase_order", "create_bill", "approve_bill", "post_journal_entry"]
  - id: "tallyhall-books"
    name: "Tallyhall Books"
    kind: "bearer_token"
    port: 9404
    integrationView: "ledger-tallyhall"
    config:
      bearer_token: "${LYNX_PARTNER_TALLYHALL_BOOKS_TOKEN}"
    scopes:
      tallyhall:read: ["get_company_info", "list_accounts", "get_account", "list_vendors", "get_vendor", "list_customers", "get_customer", "list_items", "list_bills", "get_bill", "list_invoices", "get_invoice", "list_expenses", "get_expense", "list_journal_entries", "get_journal_entry"]
      tallyhall:post: ["create_vendor", "create_bill", "match_bill", "create_expense", "post_journal_entry"]
      tallyhall:ar: ["create_customer", "create_invoice", "send_invoice", "void_invoice", "record_payment"]
      tallyhall:pay: ["pay_bill"]
      tallyhall:report: ["get_report"]
  - id: "slate-ledger"
    name: "Slate Ledger"
    kind: "bearer_token"
    port: 9405
    integrationView: "ledger-slate"
    config:
      bearer_token: "${LYNX_PARTNER_SLATE_LEDGER_TOKEN}"
    scopes:
      slate:read: ["list_accounts", "get_account", "get_entry", "list_entries", "get_reconciliation", "trial_balance", "get_period", "list_periods"]
      slate:post: ["post_entry", "reverse_entry", "reconcile_account", "create_accrual", "close_period"]
  - id: "inkwell-ocr"
    name: "Inkwell OCR"
    kind: "api_key"
    port: 9406
    integrationView: "intake-inkwell"
    config:
      auth_location: "query"
      query_param_name: "api_key"
      api_key: "${LYNX_PARTNER_INKWELL_OCR_API_KEY}"
    scopes:
      inkwell:extract: ["submit_document", "submit_documents_batch", "get_document", "get_extraction", "list_documents", "list_models", "get_model"]
      inkwell:review: ["submit_correction", "list_corrections"]
      inkwell:manage: ["cancel_document", "delete_document"]
  - id: "aegis-screening"
    name: "Aegis Screening"
    kind: "caracal_mandate"
    port: 9407
    integrationView: "compliance-aegis"
    config: {}
    scopes:
      aegis:verify: ["verify_business"]
      aegis:screen: ["screen_party", "screen_batch", "rescreen_entity", "get_screening", "list_screenings", "get_entity", "get_watchlist_hit", "list_watchlists", "get_audit_trail"]
      aegis:case: ["get_case", "list_cases", "assign_case", "add_case_note", "escalate_case", "resolve_case", "create_monitor", "get_monitor", "list_monitors"]
  - id: "verafin-monitor"
    name: "Verafin Monitor"
    kind: "caracal_mandate"
    port: 9408
    integrationView: "compliance-verafin"
    config: {}
    scopes:
      verafin:monitor: ["monitor_transaction", "get_alert", "list_alerts", "assign_alert", "resolve_alert", "get_audit_trail"]
      verafin:case: ["open_case", "get_case", "list_cases", "add_case_note", "escalate_case", "resolve_case"]
      verafin:file: ["prepare_filing", "get_filing", "list_filings", "submit_filing"]
      verafin:attest: ["list_controls", "attest_control", "get_attestation", "list_attestations"]
  - id: "lumen-identity"
    name: "Lumen Identity"
    kind: "none"
    port: 9409
    integrationView: "compliance-lumen"
    config: {}
    scopes:
      lumen:read: ["get_user", "lookup_user", "list_users", "get_user_access", "list_direct_reports", "get_manager_chain", "list_roles", "get_role", "list_groups", "get_group", "list_teams", "get_team", "list_departments", "get_department", "list_service_accounts", "get_service_account"]
  - id: "beacon-crm"
    name: "Beacon CRM"
    kind: "bearer_token"
    port: 9410
    integrationView: "intake-beacon"
    config:
      bearer_token: "${LYNX_PARTNER_BEACON_CRM_TOKEN}"
    scopes:
      beacon:read: ["list_contacts", "get_contact", "list_accounts", "get_account", "list_deals", "get_deal", "list_activities", "list_notes", "list_relationships"]
      beacon:write: ["create_contact", "update_contact", "update_deal", "log_activity", "add_note"]
  - id: "atlas-vendor"
    name: "Atlas Vendor Network"
    kind: "bearer_token"
    protocol: "mcp"
    port: 9411
    integrationView: "intake-atlas"
    config:
      bearer_token: "${LYNX_PARTNER_ATLAS_VENDOR_TOKEN}"
    scopes:
      atlas:read: ["search_vendors", "list_vendors", "get_vendor_profile", "list_vendor_contacts", "get_onboarding_status", "get_compliance_status", "list_vendor_documents", "list_contracts", "get_contract_terms"]
      atlas:onboard: ["register_vendor", "advance_onboarding", "verify_vendor_banking", "submit_vendor_document", "set_vendor_status"]
  - id: "keystone-treasury"
    name: "Keystone Treasury"
    kind: "api_key"
    port: 9412
    integrationView: "treasury-keystone"
    config:
      auth_location: "header"
      header_name: "x-api-key"
      api_key: "${LYNX_PARTNER_KEYSTONE_TREASURY_API_KEY}"
    scopes:
      keystone:read: ["list_positions", "get_position", "get_account", "get_position_summary", "watch_positions", "forecast_liquidity", "list_hedges", "get_hedge", "get_transfer", "list_transfers", "get_exposure", "list_exposures", "list_operations", "get_operation"]
      keystone:move: ["place_hedge", "cancel_hedge", "transfer_funds"]
  - id: "sabre-tax"
    name: "Sabre Tax"
    kind: "api_key"
    port: 9413
    integrationView: "compliance-sabre"
    config:
      auth_location: "header"
      header_name: "X-Api-Key"
      api_key: "${LYNX_PARTNER_SABRE_TAX_API_KEY}"
    scopes:
      sabre:tax: ["calculate_tax", "resolve_jurisdiction", "validate_tax_id", "determine_withholding", "get_exemption_certificate", "list_tax_codes"]
      sabre:read: ["get_transaction"]
      sabre:commit: ["commit_transaction", "void_transaction"]
  - id: "quetzal-payouts"
    name: "Quetzal Payouts"
    kind: "bearer_token"
    port: 9414
    integrationView: "payments-quetzal"
    config:
      bearer_token: "${LYNX_PARTNER_QUETZAL_PAYOUTS_TOKEN}"
    scopes:
      quetzal:payout: ["create_recipient", "get_recipient", "verify_recipient", "get_quote", "create_payout", "get_payout", "cancel_payout", "list_payouts", "create_batch", "get_balance"]
      quetzal:read: ["list_recipients", "get_batch", "list_batches", "list_settlements"]
  - id: "vela-notify"
    name: "Vela Notify"
    kind: "bearer_token"
    port: 9415
    integrationView: "ledger-vela"
    config:
      bearer_token: "${LYNX_PARTNER_VELA_NOTIFY_TOKEN}"
