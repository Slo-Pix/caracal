# Every swarm role, the application boundary it runs under, and the least-privilege
# scope set its delegation edge is narrowed to. Orchestrator roles coordinate only and
# hold no partner scopes. partner-integration is dynamic: it spawns under the
# application that owns the target provider's integrationView, narrowed to that view.
roles:
  - name: "finance-control"
    application: "operations"
    scopes: []
  - name: "regional-orchestrator"
    application: "operations"
    scopes: []
  - name: "workflow-orchestrator"
    application: "operations"
    scopes: []
  - name: "partner-integration"
    application: "operations"
    scopes: []
    dynamic: true
  - name: "invoice-intake"
    application: "intake"
    scopes: ["inkwell:extract", "atlas:read", "cordoba:quote"]
  - name: "vendor-lifecycle"
    application: "intake"
    scopes: ["aegis:verify", "atlas:read", "atlas:onboard", "junction:read", "junction:requisition", "junction:order", "beacon:read", "beacon:write"]
  - name: "ledger-match"
    application: "ledger"
    scopes: ["ironbark:read", "ironbark:post", "tallyhall:read", "tallyhall:post"]
  - name: "close"
    application: "ledger"
    scopes: ["slate:read", "slate:post"]
  - name: "receivables"
    application: "ledger"
    scopes: ["corebilling:read", "corebilling:post", "corebilling:collect", "vela:send", "vela:read"]
  - name: "policy-check"
    application: "compliance"
    scopes: ["aegis:screen", "verafin:monitor", "sabre:tax"]
  - name: "compliance"
    application: "compliance"
    scopes: ["aegis:screen", "verafin:monitor", "verafin:case", "verafin:file", "verafin:attest", "lumen:read"]
  - name: "exception"
    application: "compliance"
    scopes: ["aegis:screen", "atlas:read"]
  - name: "route-optimization"
    application: "treasury"
    scopes: ["halcyon:read", "cordoba:quote", "cordoba:convert", "pulse:read", "sabre:tax"]
  - name: "treasury"
    application: "treasury"
    scopes: ["keystone:read", "keystone:move"]
  - name: "payment-execution"
    application: "payments"
