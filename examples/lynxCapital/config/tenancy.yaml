      junction:order: ["create_purchase_order", "acknowledge_order", "receive_order"]

# Per-application resource views. The Gateway binds every view to exactly one
# application and one credential provider; a view exposes only the scope names its
# application boundary is allowed to hold. Registered resource scopes additionally
# include agent:lifecycle so each application can bootstrap its session mandate.
resources:
  - id: "ops-relay"
    identifier: "resource://ops-relay"
    name: "Operations · Relay Automation"
    application: "operations"
    provider: "relay-automation"
    scopes: ["relay:read", "relay:execute"]
  - id: "intake-inkwell"
    identifier: "resource://intake-inkwell"
    name: "Intake · Inkwell OCR"
    application: "intake"
    provider: "inkwell-ocr"
    scopes: ["inkwell:extract"]
  - id: "intake-atlas"
    identifier: "resource://intake-atlas"
    name: "Intake · Atlas Vendor Network"
    application: "intake"
    provider: "atlas-vendor"
    scopes: ["atlas:read", "atlas:onboard"]
  - id: "intake-cordoba"
    identifier: "resource://intake-cordoba"
    name: "Intake · Cordoba FX quotes"
    application: "intake"
    provider: "cordoba-fx"
    scopes: ["cordoba:quote"]
  - id: "intake-aegis"
    identifier: "resource://intake-aegis"
    name: "Intake · Aegis KYB verification"
    application: "intake"
    provider: "aegis-screening"
    scopes: ["aegis:verify"]
  - id: "intake-junction"
    identifier: "resource://intake-junction"
    name: "Intake · Junction Procurement"
    application: "intake"
    provider: "junction-procure"
    scopes: ["junction:read", "junction:requisition", "junction:order"]
  - id: "intake-beacon"
    identifier: "resource://intake-beacon"
    name: "Intake · Beacon CRM"
    application: "intake"
    provider: "beacon-crm"
    scopes: ["beacon:read", "beacon:write"]
  - id: "ledger-ironbark"
    identifier: "resource://ledger-ironbark"
    name: "Ledger · Ironbark ERP"
    application: "ledger"
    provider: "ironbark-erp"
    scopes: ["ironbark:read", "ironbark:post"]
  - id: "ledger-tallyhall"
