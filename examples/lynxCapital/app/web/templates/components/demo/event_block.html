<template id="tpl-event-block">
  <details class="event-block kind-system">
    <summary class="event-summary">
      <span class="event-marker" aria-hidden="true"></span>
      <span class="event-main">
        <span class="event-topline">
          <span class="event-kicker"></span>
          <span class="event-title"></span>
          <span class="event-pill" hidden></span>
          <span class="event-meta"></span>
        </span>
      </span>
    </summary>
    <pre class="event-body" hidden></pre>
  </details>
</template>
