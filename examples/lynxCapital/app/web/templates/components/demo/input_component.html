<div class="chat-composer">
  <div class="composer-input-shell">
    <textarea id="prompt-input" rows="1" placeholder="Ask the team to run a finance operation, investigate an exception, or coordinate a workflow..."></textarea>
    <div class="composer-toolbar">
      <div class="composer-controls">
        <label class="model-picker">
          <select id="model-select" class="model-picker-select" title="Model"></select>
        </label>
        <label class="approval-toggle" title="Pause sensitive operations for human approval">
          <input type="checkbox" id="approval-toggle">
          <span>Approvals</span>
        </label>
        <button class="btn" id="pause-btn" hidden title="Pause or resume stream rendering">Pause</button>
        <span class="composer-hint">Enter sends · Shift+Enter adds a line</span>
      </div>
      <div class="composer-actions">
        <button class="btn btn-stop" id="stop-btn" hidden title="Cancel the current run">Cancel</button>
        <button class="composer-send" id="start-btn" type="button" aria-label="Send" title="Send">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 13V3"/><path d="M3.5 7.5 8 3l4.5 4.5"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
