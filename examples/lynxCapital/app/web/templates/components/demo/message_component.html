<template id="tpl-user-message">
  <article class="message-row message-row-user">
    <div class="message-meta message-meta-user">
      <span class="message-time"></span>
      <span class="message-author">You</span>
    </div>
    <div class="message-bubble"></div>
  </article>
</template>

<template id="tpl-agent-turn">
  <article class="message-row message-row-agent tone-worker">
    <div class="message-card">
      <header class="message-head">
        <div class="message-ident">
          <span class="message-avatar" aria-hidden="true"></span>
          <div class="message-heading">
            <span class="message-time"></span>
            <span class="message-author"></span>
            <span class="message-subtitle"></span>
          </div>
        </div>
        <div class="message-head-meta">
          <span class="message-status-pill state-thinking">Thinking</span>
          <span class="message-telemetry"></span>
        </div>
      </header>

      <details class="message-section message-section-reasoning" hidden>
        <summary class="section-label">Assistant output</summary>
        <div class="reasoning-body"></div>
      </details>

      <details class="message-section message-section-execution" hidden>
        <summary class="section-label">Execution trace</summary>
        <div class="execution-list"></div>
      </details>
    </div>
  </article>
</template>
