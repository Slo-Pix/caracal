<template id="tpl-user-message">
  <article class="msg msg-user">
    <header class="msg-meta">
      <span class="msg-author">You</span>
      <span class="msg-spacer"></span>
      <span class="msg-time"></span>
    </header>
    <div class="msg-content"></div>
  </article>
</template>

<template id="tpl-assistant-message">
  <article class="msg msg-assistant tone-worker">
    <header class="msg-meta">
      <span class="msg-avatar-dot" aria-hidden="true"></span>
      <span class="msg-author">Agent</span>
      <span class="msg-model-tag"></span>
      <span class="msg-spacer"></span>
      <span class="msg-status-indicator">Streaming</span>
      <span class="msg-time"></span>
    </header>
    <div class="msg-content"></div>
  </article>
</template>

<template id="tpl-tool-card">
  <article class="msg msg-tool">
    <details class="msg-detail-shell">
      <summary class="msg-line">
        <span class="msg-caret" aria-hidden="true"></span>
        <span class="msg-tool-name">tool_call</span>
        <span class="msg-tool-summary"></span>
        <span class="msg-spacer"></span>
        <span class="msg-tool-duration"></span>
        <span class="msg-tool-status-badge status-executing">executing</span>
        <span class="msg-time"></span>
      </summary>
      <div class="msg-detail-body">
        <div class="msg-detail-block msg-tool-args">
          <span class="msg-detail-label">Arguments</span>
          <pre class="msg-json-block"></pre>
        </div>
        <div class="msg-detail-block msg-tool-output" hidden>
          <span class="msg-detail-label">Output</span>
          <pre class="msg-json-block"></pre>
        </div>
      </div>
    </details>
  </article>
</template>

<template id="tpl-system-row">
  <div class="msg-system-row">
    <span class="msg-system-kicker">SYSTEM</span>
    <span class="msg-system-text"></span>
    <span class="msg-spacer"></span>
    <span class="msg-system-time msg-time"></span>
  </div>
</template>

<template id="tpl-security-card">
  <article class="msg msg-security">
    <details class="msg-detail-shell">
      <summary class="msg-line">
        <span class="msg-caret" aria-hidden="true"></span>
        <span class="msg-security-rule">Policy check</span>
        <span class="msg-security-reason"></span>
        <span class="msg-spacer"></span>
        <span class="msg-security-action-badge">checked</span>
        <span class="msg-time"></span>
      </summary>
      <div class="msg-detail-body">
        <div class="msg-security-policy"></div>
        <div class="msg-detail-block">
          <span class="msg-detail-label">Decision record</span>
          <pre class="msg-json-block"></pre>
        </div>
      </div>
    </details>
  </article>
</template>

<template id="tpl-approval-card">
  <article class="msg msg-approval">
    <header class="msg-meta">
      <span class="msg-approval-title">Approval required</span>
      <span class="msg-spacer"></span>
      <span class="msg-approval-state">Awaiting decision</span>
      <span class="msg-time"></span>
    </header>
    <div class="msg-approval-context"></div>
    <div class="msg-approval-actions">
      <button type="button" class="btn btn-primary btn-approve">Approve</button>
      <button type="button" class="btn btn-stop btn-reject">Reject</button>
    </div>
  </article>
</template>

<template id="tpl-provider-card">
  <article class="msg msg-provider">
    <details class="msg-detail-shell">
      <summary class="msg-line">
        <span class="msg-caret" aria-hidden="true"></span>
        <span class="msg-provider-name">model</span>
        <span class="msg-provider-tokens">0 tok</span>
        <span class="msg-spacer"></span>
        <span class="msg-provider-latency">0ms</span>
        <span class="msg-time"></span>
      </summary>
      <div class="msg-detail-body">
        <div class="msg-detail-block">
          <span class="msg-detail-label">Call telemetry</span>
          <pre class="msg-json-block"></pre>
        </div>
      </div>
    </details>
  </article>
</template>
