<div id="plan-panel" hidden>
  <div class="plan-head">
    <span id="plan-status" class="plan-status status-pending">Pending</span>
    <span id="plan-meta" class="plan-meta"></span>
    <span id="plan-active-preview" class="plan-active-preview"></span>
  </div>
  <ol id="plan-list" class="plan-list"></ol>
</div>
<div id="plan-empty" class="panel-empty">The orchestrator posts its checklist here once planning starts.</div>

<template id="tpl-plan-item">
  <li class="plan-item status-pending">
    <span class="plan-step-state" aria-hidden="true"></span>
    <span class="plan-step-index"></span>
    <span class="plan-step-text"></span>
  </li>
</template>
