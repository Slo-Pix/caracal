<section id="plan-panel" class="plan-panel plan-collapsed" hidden>
  <div class="plan-head" id="plan-toggle" title="Click to expand or collapse">
    <div class="plan-head-copy">
      <span class="plan-eyebrow">Task plan</span>
      <h2 class="plan-title">Execution checklist</h2>
    </div>
    <div class="plan-head-meta">
      <span id="plan-meta" class="plan-meta"></span>
      <span id="plan-active-preview" class="plan-active-preview"></span>
      <span id="plan-status" class="plan-status status-pending"></span>
      <span id="plan-chevron" class="plan-chevron" aria-hidden="true">▼</span>
    </div>
  </div>
  <ol id="plan-list" class="plan-list"></ol>
</section>

<template id="tpl-plan-item">
  <li class="plan-item status-pending">
    <div class="plan-step-state" aria-hidden="true"></div>
    <span class="plan-step-index"></span>
    <span class="plan-step-text"></span>
  </li>
</template>
