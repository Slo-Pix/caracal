    idempotency: required
    webhook_secret_env: "BILLING_WEBHOOK_SECRET"
    rate_limit: { capacity: 100, refill_per_s: 30 }

  fx-rates:
    auth: { header: "X-API-Key", prefix: "", env: "FX_API_KEY" }
