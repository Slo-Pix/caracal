# Runtime compose for end-user installs. Pulls versioned images from GHCR; no source build required.

name: caracal

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-redis:v${CARACAL_VERSION}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisData:/data
      - type: tmpfs
        target: /run/caracal
        tmpfs:
          mode: 1023
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning PING | grep -q PONG && test -f /run/caracal/provisioned"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  sts:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-sts:v${CARACAL_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ZONE_KEK: ${ZONE_KEK}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      ZONE_KEK_PROVIDER: local
      ISSUER_URL: http://localhost:8080
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  api:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-api:v${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ZONE_KEK: ${ZONE_KEK}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      CARACAL_ADMIN_TOKEN: ${CARACAL_ADMIN_TOKEN}
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  gateway:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-gateway:v${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      PORT: 8081
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  audit:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-audit:v${CARACAL_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-}
      PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coordinator:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-coordinator:v${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ISSUER_URL: http://localhost:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      AGENT_COORDINATOR_SCOPE: agent:lifecycle
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  postgresData:
  redisData:
