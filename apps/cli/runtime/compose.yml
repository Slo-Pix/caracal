# Runtime compose for end-user installs. Pulls versioned images from GHCR; no source build required.

name: caracal

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    command:
      - "--requirepass"
      - "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redisData:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} --no-auth-warning PING | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  init:
    image: redis:8-alpine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    entrypoint: ["/bin/sh", "/caracal/provision-streams.sh"]
    volumes:
      - ./provision-streams.sh:/caracal/provision-streams.sh:ro
    restart: "no"

  sts:
    image: ghcr.io/garudex-labs/caracal-sts:${CARACAL_VERSION}
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ZONE_KEK: ${ZONE_KEK}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      ZONE_KEK_PROVIDER: local
      ISSUER_URL: http://localhost:8080
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ghcr.io/garudex-labs/caracal-api:${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ZONE_KEK: ${ZONE_KEK}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      CARACAL_ADMIN_TOKEN: ${CARACAL_ADMIN_TOKEN}
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    image: ghcr.io/garudex-labs/caracal-gateway:${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  audit:
    image: ghcr.io/garudex-labs/caracal-audit:${CARACAL_VERSION}
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-}
      PORT: "9090"
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  coordinator:
    image: ghcr.io/garudex-labs/caracal-coordinator:${CARACAL_VERSION}
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: runtime
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ISSUER_URL: http://localhost:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      AGENT_COORDINATOR_SCOPE: agent:lifecycle
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgresData:
  redisData:
