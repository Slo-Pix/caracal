# Default Helm values for a Caracal Kubernetes deployment.

global:
  registry: ghcr.io/garudex-labs
  tag: "2026.06.09-rc.1"
  imagePullPolicy: IfNotPresent
  mode: rc
  evaluation: false
  otelExporterOtlpEndpoint: ""
  logLevel: info
  podLabels: {}
  podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false

secrets:
  create: false
  runtimeSecretName: caracal-runtime
  plaintext:
    postgresPassword: ""
    redisPassword: ""
    caracalAdminToken: ""
    stsAdminToken: ""
    auditAdminToken: ""
    metricsBearer: ""
    caracalCoordinatorToken: ""
    zoneKek: ""
    auditHmacKey: ""
    streamsHmacKey: ""
    gatewayStsHmacKey: ""
  database:
    user: caracal
    passwordKey: postgresPassword
    host: postgres.default.svc.cluster.local
    port: 5432
    name: caracal
    sslMode: require
  redis:
    passwordKey: redisPassword
    host: redis.default.svc.cluster.local
    port: 6379
    database: 0
  stsAdminToken:
    secretName: ""
    key: stsAdminToken
  auditAdminToken:
    secretName: ""
    key: auditAdminToken
  metricsBearer:
    secretName: ""
    key: metricsBearer

migrations:
  enabled: true
  backoffLimit: 3

networkPolicy:
  enabled: true
  # When extraEgress is empty, the policy allows Postgres ({{ .secrets.database.port }}),
  # Redis ({{ .secrets.redis.port }}), and OTLP (4317/4318). Platform teams should set dnsEgress
  # and extraEgress to named peers or CIDRs for DNS, provider APIs, object stores, identity providers,
  # and other upstreams.
  # extraIngress is the only supported way to admit traffic from outside Caracal pods.
  # For Gateway ingress controllers, add a rule with an explicit from selector and port 8081.
  extraIngress: []
  allowOpenHttps: false
  allowOpenDns: false
  dnsEgress: []
  extraEgress: []

replayPersistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

serviceMonitor:
  enabled: false
  interval: 30s

alertRules:
  enabled: true
  labels: {}
  stsMaxPolicyAgeSeconds: 300
  auditDlqSize: 0
  auditDlqGrowth: 0
  auditConsumerLag: 1000
  auditReplayOldestAgeSeconds: 300
  apiOutboxDead: 0
  apiOutboxPendingAgeSeconds: 300
  gatewayStsExchangeErrors: 0
  gatewayStsCircuitOpen: 0
  gatewayRevocationSnapshotFresh: 0
  gatewayRevocationPropagationSeconds: 30
  gatewayRevocationReloadErrors: 0
  stsProviderRefreshErrors: 0
  stsProviderCircuitOpen: 0
  dbPoolInUseRatio: 0.9
  readinessFlapsPer10m: 4

scheduling:
  # Soft pod-anti-affinity on hostname spreads replicas of the same service
  # across nodes; topology spread balances them across failure domains.
  # Override per service via services.<name>.affinity / topologySpreadConstraints.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: caracal
                app.kubernetes.io/component: "{{ .name }}"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: caracal
          app.kubernetes.io/component: "{{ .name }}"

services:
  sts:
    enabled: true
    replicas: 2
    image: caracal-sts
    port: 8080
    issuerUrl: ""
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  api:
    enabled: true
    replicas: 2
    image: caracal-api
    port: 3000
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  gateway:
    enabled: true
    replicas: 2
    image: caracal-gateway
    port: 8081
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 16
      targetCPUUtilizationPercentage: 65
  audit:
    enabled: true
    replicas: 2
    image: caracal-audit
    port: 9090
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  coordinator:
    enabled: true
    replicas: 2
    image: caracal-coordinator
    port: 4000
    requiredScope: agent:lifecycle
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  control:
    enabled: false
    replicas: 1
    image: caracal-control
    port: 8087
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    pdb:
      enabled: false
      minAvailable: "50%"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70

ingress:
  gateway:
    enabled: false
    className: ""
    host: gateway.caracal.example.com
    tlsSecretName: ""
    annotations: {}
  api:
    enabled: false
    className: ""
    host: api.caracal.example.com
    tlsSecretName: ""
    annotations: {}
