# Default Helm values for a flexible Caracal Kubernetes deployment.

global:
  registry: ghcr.io/garudex-labs
  tag: "0.1.2"
  imagePullPolicy: IfNotPresent
  mode: stable
  otelExporterOtlpEndpoint: ""
  logLevel: info
  podLabels: {}
  podAnnotations: {}

serviceAccount:
  create: true
  name: ""

secrets:
  create: false
  runtimeSecretName: caracal-runtime
  plaintext:
    postgresPassword: ""
    redisPassword: ""
    caracalAdminToken: ""
    zoneKek: ""
    auditHmacKey: ""
    streamsHmacKey: ""
    gatewayStsHmacKey: ""
  database:
    user: caracal
    passwordKey: postgresPassword
    host: postgres.default.svc.cluster.local
    port: 5432
    name: caracal
    sslMode: require
  redis:
    passwordKey: redisPassword
    host: redis.default.svc.cluster.local
    port: 6379
    database: 0

migrations:
  enabled: true
  backoffLimit: 3

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

alertRules:
  enabled: false
  labels: {}
  stsMaxPolicyAgeSeconds: 300
  auditDlqSize: 0
  auditConsumerLag: 1000
  gatewayStsExchangeErrors: 0

services:
  sts:
    enabled: true
    replicas: 2
    image: caracal-sts
    port: 8080
    issuerUrl: ""
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: 1
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  api:
    enabled: true
    replicas: 2
    image: caracal-api
    port: 3000
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: 1
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  gateway:
    enabled: true
    replicas: 2
    image: caracal-gateway
    port: 8081
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: 1
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 16
      targetCPUUtilizationPercentage: 65
  audit:
    enabled: true
    replicas: 2
    image: caracal-audit
    port: 9090
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: 1
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  coordinator:
    enabled: true
    replicas: 2
    image: caracal-coordinator
    port: 4000
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: 1
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  control:
    enabled: false
    replicas: 1
    image: caracal-control
    port: 8087
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    pdb:
      enabled: false
      minAvailable: 1
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70

ingress:
  gateway:
    enabled: false
    className: ""
    host: gateway.caracal.example.com
    tlsSecretName: ""
    annotations: {}
  api:
    enabled: false
    className: ""
    host: api.caracal.example.com
    tlsSecretName: ""
    annotations: {}
