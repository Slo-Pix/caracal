{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "caracal.fullname" . }}
  labels:
    {{- include "caracal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "caracal.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "caracal.selectorLabels" . | nindent 14 }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowOpenDns }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.dnsEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "caracal.selectorLabels" . | nindent 14 }}
    - ports:
        - protocol: TCP
          port: {{ .Values.secrets.database.port }}
        - protocol: TCP
          port: {{ .Values.secrets.redis.port }}
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    {{- if .Values.networkPolicy.allowOpenHttps }}
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
