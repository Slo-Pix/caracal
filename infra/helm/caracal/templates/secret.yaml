Optional evaluation secret template for Caracal runtime credentials.
*/}}

{{- if .Values.secrets.create }}
{{- if and (eq .Values.global.mode "rc") (not .Values.global.evaluation) }}
{{- fail "secrets.create=true with global.mode=rc requires global.evaluation=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "caracal.runtimeSecretName" . }}
  labels:
    {{- include "caracal.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresPassword: {{ required "secrets.plaintext.postgresPassword is required when secrets.create=true" .Values.secrets.plaintext.postgresPassword | quote }}
  redisPassword: {{ required "secrets.plaintext.redisPassword is required when secrets.create=true" .Values.secrets.plaintext.redisPassword | quote }}
  caracalAdminToken: {{ required "secrets.plaintext.caracalAdminToken is required when secrets.create=true" .Values.secrets.plaintext.caracalAdminToken | quote }}
  {{- with .Values.secrets.plaintext.stsAdminToken }}
  stsAdminToken: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.plaintext.auditAdminToken }}
  auditAdminToken: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.plaintext.metricsBearer }}
  metricsBearer: {{ . | quote }}
  {{- end }}
  caracalCoordinatorToken: {{ required "secrets.plaintext.caracalCoordinatorToken is required when secrets.create=true" .Values.secrets.plaintext.caracalCoordinatorToken | quote }}
  zoneKek: {{ required "secrets.plaintext.zoneKek is required when secrets.create=true" .Values.secrets.plaintext.zoneKek | quote }}
  auditHmacKey: {{ required "secrets.plaintext.auditHmacKey is required when secrets.create=true" .Values.secrets.plaintext.auditHmacKey | quote }}
  streamsHmacKey: {{ required "secrets.plaintext.streamsHmacKey is required when secrets.create=true" .Values.secrets.plaintext.streamsHmacKey | quote }}
  gatewayStsHmacKey: {{ required "secrets.plaintext.gatewayStsHmacKey is required when secrets.create=true" .Values.secrets.plaintext.gatewayStsHmacKey | quote }}
  databaseUrl: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" (urlquery .Values.secrets.database.user) (urlquery .Values.secrets.plaintext.postgresPassword) .Values.secrets.database.host .Values.secrets.database.port .Values.secrets.database.name .Values.secrets.database.sslMode | quote }}
  redisUrl: {{ printf "redis://:%s@%s:%v/%v" (urlquery .Values.secrets.plaintext.redisPassword) .Values.secrets.redis.host .Values.secrets.redis.port .Values.secrets.redis.database | quote }}
{{- end }}
