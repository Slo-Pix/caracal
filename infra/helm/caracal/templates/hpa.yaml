{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.hpa.enabled }}
{{- $statefulReplay := and $.Values.replayPersistence.enabled (or (eq $name "sts") (eq $name "gateway")) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "caracal.fullname" $ }}-{{ $name }}
  labels:
    {{- include "caracal.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ ternary "StatefulSet" "Deployment" $statefulReplay }}
    name: {{ include "caracal.fullname" $ }}-{{ $name }}
  minReplicas: {{ $service.hpa.minReplicas }}
  maxReplicas: {{ $service.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $service.hpa.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
