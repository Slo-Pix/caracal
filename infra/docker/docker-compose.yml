# Local-dev orchestration for the OSS Caracal stack.

name: caracal-dev

x-logging: &defaultLogging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security: &defaultSecurity
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-appService: &appService
  restart: unless-stopped
  init: true
  stop_grace_period: 20s
  logging: *defaultLogging
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
    nproc: 4096
  sysctls:
    net.ipv4.tcp_keepalive_time: 60
    net.ipv4.tcp_keepalive_intvl: 10
    net.ipv4.tcp_keepalive_probes: 6
  networks:
    - caracalData

x-appResources: &appResources
  deploy:
    resources:
      limits:
        cpus: "${CARACAL_APP_CPU_LIMIT:-1.0}"
        memory: "${CARACAL_APP_MEM_LIMIT:-512M}"
        pids: 256
      reservations:
        cpus: "${CARACAL_APP_CPU_RESERVE:-0.1}"
        memory: "${CARACAL_APP_MEM_RESERVE:-128M}"

networks:
  caracalData:
    driver: bridge
    name: caracalData
    internal: false
    driver_opts:
      com.docker.network.bridge.name: brCaracalData

secrets:
  postgresPassword:
    file: ../secrets/files/postgresPassword
  redisPassword:
    file: ../secrets/files/redisPassword
  caracalAdminToken:
    file: ../secrets/files/caracalAdminToken
  caracalCoordinatorToken:
    file: ../secrets/files/caracalCoordinatorToken
  zoneKek:
    file: ../secrets/files/zoneKek
  auditHmacKey:
    file: ../secrets/files/auditHmacKey
  streamsHmacKey:
    file: ../secrets/files/streamsHmacKey
  gatewayStsHmacKey:
    file: ../secrets/files/gatewayStsHmacKey
  databaseUrl:
    file: ../secrets/files/databaseUrl
  redisUrl:
    file: ../secrets/files/redisUrl

services:
  postgres:
    build:
      context: ../postgres
    image: localhost/caracal-postgres:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *defaultLogging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    networks:
      - caracalData
    secrets:
      - source: postgresPassword
        target: postgresPassword
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caracal}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgresPassword
      POSTGRES_DB: ${POSTGRES_DB:-caracal}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "synchronous_commit=on"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_MS:-500}"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "password_encryption=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=0755
    shm_size: "256m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h /var/run/postgresql"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${CARACAL_DB_CPU_LIMIT:-2.0}"
          memory: "${CARACAL_DB_MEM_LIMIT:-1G}"
        reservations:
          memory: "${CARACAL_DB_MEM_RESERVE:-256M}"

  redis:
    build:
      context: ../redis
    image: localhost/caracal-redis:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    logging: *defaultLogging
    <<: *defaultSecurity
    networks:
      - caracalData
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redisPassword
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
    secrets:
      - source: redisPassword
        target: redisPassword
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisData:/data
      - type: tmpfs
        target: /run/caracal
        tmpfs:
          mode: 1023
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redisPassword) redis-cli --no-auth-warning PING | grep -q PONG && test -f /run/caracal/provisioned"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${CARACAL_REDIS_CPU_LIMIT:-1.0}"
          memory: "${CARACAL_REDIS_MEM_LIMIT:-768M}"
        reservations:
          memory: "${CARACAL_REDIS_MEM_RESERVE:-128M}"

  dbMigrate:
    image: localhost/caracal-postgres:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    build:
      context: ../postgres
    restart: "no"
    init: true
    logging: *defaultLogging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - caracalData
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - source: postgresPassword
        target: postgresPassword
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-caracal}
      PGPASSWORD_FILE: /run/secrets/postgresPassword
      PGDATABASE: ${POSTGRES_DB:-caracal}
      PGSSLMODE: disable
    entrypoint: ["/bin/sh", "/usr/local/bin/caracal-migrate"]

  sts:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE: sts
        PORT: "8080"
        STATE_DIRS: "audit-replay"
    image: localhost/caracal-sts:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: zoneKek
        target: zoneKek
      - source: auditHmacKey
        target: auditHmacKey
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      ZONE_KEK_FILE: /run/secrets/zoneKek
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      ZONE_KEK_PROVIDER: local
      ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://sts:8080}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-sts
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - stsReplay:/var/lib/caracal
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  api:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: localhost/caracal-api:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      sts:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    networks:
      - caracalData
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: zoneKek
        target: zoneKek
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
      - source: caracalAdminToken
        target: caracalAdminToken
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      ZONE_KEK_FILE: /run/secrets/zoneKek
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      CARACAL_ADMIN_TOKEN_FILE: /run/secrets/caracalAdminToken
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-api
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  gateway:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE: gateway
        PORT: "8081"
        STATE_DIRS: "audit-replay"
    image: localhost/caracal-gateway:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      sts:
        condition: service_healthy
      api:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    networks:
      - caracalData
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: auditHmacKey
        target: auditHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-gateway
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
      PORT: 8081
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - gatewayReplay:/var/lib/caracal
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  audit:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.go-service
      args:
        SERVICE: audit
        PORT: "9090"
    image: localhost/caracal-audit:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: auditHmacKey
        target: auditHmacKey
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-}
      AUDIT_EXPORT_S3_REGION: ${AUDIT_EXPORT_S3_REGION:-us-east-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-audit
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
      PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coordinator:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: apps/coordinator/Dockerfile
    image: localhost/caracal-coordinator:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      sts:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: caracalCoordinatorToken
        target: caracalCoordinatorToken
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://sts:8080}
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      CARACAL_COORDINATOR_TOKEN_FILE: /run/secrets/caracalCoordinatorToken
      AGENT_COORDINATOR_SCOPE: agent:lifecycle
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-coordinator
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  control:
    <<: [*appService, *appResources]
    profiles: [control]
    build:
      context: ../..
      dockerfile: apps/control/Dockerfile
    image: localhost/caracal-control:${CARACAL_DEV_VERSION:-${CARACAL_BASE_VERSION:-2026.05.26}-dev.sha${CARACAL_DEV_SHA:-local}}
    depends_on:
      sts:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: redisUrl
        target: redisUrl
      - source: caracalAdminToken
        target: caracalAdminToken
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      CARACAL_CONTROL_ENABLED: "${CARACAL_ENGINE_CONTROL_ENABLED:-false}"
      CONTROL_GATE_FILE: /run/caracal-control/enabled
      STS_JWKS_URL: ${CARACAL_STS_ISSUER_URL:-http://sts:8080}/.well-known/jwks.json
      STS_ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://sts:8080}
      CONTROL_AUDIENCE: ${CONTROL_AUDIENCE:-caracal-control}
      CONTROL_PORT: "8087"
      CONTROL_HOST: "0.0.0.0"
      CONTROL_REDIS_URL_FILE: /run/secrets/redisUrl
      CARACAL_API_URL: http://api:3000
      CONTROL_API_TOKEN_FILE: /run/secrets/caracalAdminToken
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: caracal-control
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=caracal,deployment.environment=${CARACAL_MODE:-dev}
    ports:
      - "127.0.0.1:8087:8087"
    volumes:
      - "${CARACAL_CONTROL_STATE_DIR:-./control}:/run/caracal-control:ro"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  postgresData:
  redisData:
  stsReplay:
  gatewayReplay:

# The control service is disabled by default and managed by the engine.
# Use the authenticated interactive Console Control menu
# so lifecycle state, endpoint status, and cleanup remain consistent.
# Direct compose profile use does not enable the endpoint.
