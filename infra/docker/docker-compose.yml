# Local-dev orchestration for the OSS Caracal stack.

name: caracal-dev

x-logging: &defaultLogging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security: &defaultSecurity
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-appService: &appService
  restart: unless-stopped
  init: true
  stop_grace_period: 20s
  logging: *defaultLogging
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
    nproc: 4096
  sysctls:
    net.ipv4.tcp_keepalive_time: 60
    net.ipv4.tcp_keepalive_intvl: 10
    net.ipv4.tcp_keepalive_probes: 6
  networks:
    - caracal

x-appResources: &appResources
  deploy:
    resources:
      limits:
        cpus: "${CARACAL_APP_CPU_LIMIT:-1.0}"
        memory: "${CARACAL_APP_MEM_LIMIT:-512M}"
        pids: 256
      reservations:
        memory: "${CARACAL_APP_MEM_RESERVE:-128M}"

networks:
  caracal:
    driver: bridge
    name: caracal
    driver_opts:
      com.docker.network.bridge.name: br-caracal

services:
  postgres:
    build:
      context: ../postgres
    image: localhost/caracal-postgres:dev-${CARACAL_DEV_SHA:-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *defaultLogging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    networks:
      - caracal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "synchronous_commit=on"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_MS:-500}"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql
    tmpfs:
      - /tmp
      - /var/run/postgresql
    shm_size: "256m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${CARACAL_DB_CPU_LIMIT:-2.0}"
          memory: "${CARACAL_DB_MEM_LIMIT:-1G}"
        reservations:
          memory: "${CARACAL_DB_MEM_RESERVE:-256M}"

  redis:
    build:
      context: ../redis
    image: localhost/caracal-redis:dev-${CARACAL_DEV_SHA:-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    logging: *defaultLogging
    <<: *defaultSecurity
    networks:
      - caracal
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisData:/data
      - type: tmpfs
        target: /run/caracal
        tmpfs:
          mode: 1023
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning PING | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${CARACAL_REDIS_CPU_LIMIT:-1.0}"
          memory: "${CARACAL_REDIS_MEM_LIMIT:-768M}"
        reservations:
          memory: "${CARACAL_REDIS_MEM_RESERVE:-128M}"

  init:
    image: localhost/caracal-redis:dev-${CARACAL_DEV_SHA:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    entrypoint: ["/bin/sh", "/caracal/provision-streams.sh"]
    volumes:
      - ../redis/provision-streams.sh:/caracal/provision-streams.sh:ro
    networks:
      - caracal
    logging: *defaultLogging
    <<: *defaultSecurity
    restart: "no"

  sts:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: services/sts/Dockerfile
    image: localhost/caracal-sts:dev-${CARACAL_DEV_SHA:-local}
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ZONE_KEK: ${ZONE_KEK}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      ZONE_KEK_PROVIDER: local
      ISSUER_URL: http://localhost:8080
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - stsReplay:/var/lib/caracal
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  api:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: localhost/caracal-api:dev-${CARACAL_DEV_SHA:-local}
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ZONE_KEK: ${ZONE_KEK}
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      CARACAL_ADMIN_TOKEN: ${CARACAL_ADMIN_TOKEN}
      CARACAL_LOCAL_BOOTSTRAP_ENABLED: ${CARACAL_LOCAL_BOOTSTRAP_ENABLED:-true}
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  gateway:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    image: localhost/caracal-gateway:dev-${CARACAL_DEV_SHA:-local}
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      sts:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      PORT: 8081
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  audit:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: services/audit/Dockerfile
    image: localhost/caracal-audit:dev-${CARACAL_DEV_SHA:-local}
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-}
      AUDIT_EXPORT_S3_REGION: ${AUDIT_EXPORT_S3_REGION:-us-east-1}
      PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coordinator:
    <<: [*appService, *appResources]
    build:
      context: ../..
      dockerfile: apps/coordinator/Dockerfile
    image: localhost/caracal-coordinator:dev-${CARACAL_DEV_SHA:-local}
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      sts:
        condition: service_healthy
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STS_URL: http://sts:8080
      ISSUER_URL: http://localhost:8080
      STREAMS_HMAC_KEY: ${STREAMS_HMAC_KEY}
      AGENT_COORDINATOR_SCOPE: agent:lifecycle
      PORT: 4000
      HOST: 0.0.0.0

    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  postgresData:
  redisData:
  stsReplay:
