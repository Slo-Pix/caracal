# Optional LiteLLM proxy: a stateless normalizer. No keys; the Caracal hook supplies the sealed key. Azure mapped so GPT-5 param quirks are remapped via drop_params; other models forward by wildcard.

litellm_settings:
  drop_params: true
  callbacks: ["caracal_key_hook.caracal_key_hook"]

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: https://caracalaus.services.ai.azure.com
      api_version: preview
      base_model: azure/gpt-5.4-mini
  - model_name: "*"
    litellm_params:
      model: openai/*
