# LiteLLM proxy config: normalizes every provider to the OpenAI wire format for the Operator, so model-specific parameter quirks never reach Caracal. No keys live here; Caracal seals the upstream key, the gateway injects it as X-API-Key, and LiteLLM forwards it to the provider.

litellm_settings:
  drop_params: true

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: https://caracalaus.services.ai.azure.com
      api_version: "2024-10-21"
  - model_name: "*"
    litellm_params:
      model: openai/*

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  forward_llm_provider_auth_headers: true
