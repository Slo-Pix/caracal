# Codecov configuration: paths excluded from coverage reporting.

ignore:
  - "examples/**"
  - "docs/**"
  - "**/*.gen.ts"
  - "apps/*/src/main.ts"
  - "services/sts/internal/db.go"
  - "services/sts/internal/redis.go"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
