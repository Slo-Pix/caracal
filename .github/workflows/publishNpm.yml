#
# Publishes selected TypeScript packages to npm from a protected CI environment.

name: publishNpm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all
          - core
          - oauth
          - admin
          - identity
          - revocation
          - sdk
          - transport-mcp
          - transport-a2a
          - express
          - fastmcp
          - postgres
          - redis
      baseRef:
        description: 'Diff base. Empty uses latest release tag.'
        required: false
        default: ''
        type: string
      dryRun:
        description: 'Build only.'
        required: false
        default: false
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - macos-15
          - windows-2022
  workflow_call:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        type: string
      baseRef:
        description: 'Diff base. Empty uses latest release tag.'
        required: false
        default: ''
        type: string
      dryRun:
        description: 'Build only.'
        required: false
        default: false
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-npm-${{ inputs.package }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'

jobs:
  select:
    name: Select packages
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      preflightMatrix: ${{ steps.matrix.outputs.preflightMatrix }}
      hasPackages: ${{ steps.matrix.outputs.hasPackages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate dispatch ref and actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" && ! "${GITHUB_REF_NAME}" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::npm publishing must run from ${{ github.event.repository.default_branch }} or a Caracal release tag."
            exit 1
          fi
          actor="${{ github.actor }}"
          maintainers="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/MAINTAINERS?ref=${{ github.event.repository.default_branch }}" --jq '.content' | base64 -d > "$maintainers"
          if ! grep -Eo '@[[:alnum:]_-]+' "$maintainers" | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS on ${{ github.event.repository.default_branch }} and cannot publish npm packages."
            exit 1
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: matrix
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          BASE_REF: ${{ inputs.baseRef }}
        run: |
          set -euo pipefail
          args=(--ecosystem npm --format github-matrix)
          if [[ "$PACKAGE" == 'all' ]]; then
            args+=(--all-packages)
          elif [[ -n "$BASE_REF" ]]; then
            args+=(--since "$BASE_REF")
          fi
          if [[ "$PACKAGE" != 'all' && "$PACKAGE" != 'changed' ]]; then
            args+=(--package "$PACKAGE")
          fi
          selected="$(node scripts/releasePlan.mjs "${args[@]}")"
          hasPackages="$(node -e "const m = JSON.parse(process.argv[1]); console.log(m.include.length > 0 ? 'true' : 'false')" "$selected")"
          preflight="$(node -e "const m = JSON.parse(process.argv[1]); const os = ['ubuntu-24.04', 'macos-15', 'windows-2022']; console.log(JSON.stringify({ include: m.include.flatMap((pkg) => os.map((runner) => ({ ...pkg, runner }))) }));" "$selected")"
          {
            echo 'matrix<<JSON'
            printf '%s\n' "$selected"
            echo JSON
            echo 'preflightMatrix<<JSON'
            printf '%s\n' "$preflight"
            echo JSON
            echo "hasPackages=$hasPackages"
          } >> "$GITHUB_OUTPUT"

  preflight:
    name: Check ${{ matrix.name }} on ${{ matrix.runner }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true'
    needs: select
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.preflightMatrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Validate package
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${name}@${ver}"
            exit 1
          fi
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          node - "$RUNNER_TEMP/npm-pack.json" <<'NODE'
          const { readFileSync } = require('node:fs');
          const pack = JSON.parse(readFileSync(process.argv[2], 'utf8'))[0];
          const files = new Set(pack.files.map((file) => file.path));
          if (![...files].some((file) => file.startsWith('dist/'))) {
            throw new Error('npm package missing dist/');
          }
          if (!files.has('package.json')) {
            throw new Error('npm package missing package.json');
          }
          NODE

  auth:
    name: Verify npm token
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true' && inputs.dryRun != true
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify npm scope access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm whoami >/dev/null

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true' && inputs.dryRun != true
    needs: [select, preflight, auth]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ matrix.name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Validate package
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${name}@${ver}"
            exit 1
          fi
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          node - "$RUNNER_TEMP/npm-pack.json" <<'NODE'
          const { readFileSync } = require('node:fs');
          const pack = JSON.parse(readFileSync(process.argv[2], 'utf8'))[0];
          const files = new Set(pack.files.map((file) => file.path));
          if (![...files].some((file) => file.startsWith('dist/'))) {
            throw new Error('npm package missing dist/');
          }
          if (!files.has('package.json')) {
            throw new Error('npm package missing package.json');
          }
          NODE

      - name: Publish package
        if: inputs.dryRun != true
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          dist_tag="latest"
          [[ "$ver" == *"-rc."* ]] && dist_tag="rc"
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "Skipping ${name}@${ver}; it is already published."
            exit 0
          fi
          npm publish --access public --tag "$dist_tag" --provenance

      - name: Verify published package
        if: inputs.dryRun != true
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          published="$(npm view "${name}@${ver}" version)"
          test "$published" = "$ver"

      - name: Dry-run summary
        if: inputs.dryRun == true
        working-directory: ${{ matrix.dir }}
        run: |
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          echo "Validated npm package ${name}@${ver} without publishing."
