# CodeQL security analysis workflow for Go, Python, and TypeScript sources.

name: "CodeQL Analysis"

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 4 * * 1,3,5'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        language: [go, python, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: matrix.language == 'go'
        with:
          go-version: '1.26'

      - uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/autobuild@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2

      - uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: /language:${{ matrix.language }}
