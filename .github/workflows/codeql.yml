# CodeQL security analysis workflow for Go, Python, and TypeScript sources.

name: "CodeQL Analysis"

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
  schedule:
    - cron: '0 4 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setLanguages:
    name: Select languages
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      languages: ${{ steps.select.outputs.languages }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select changed languages
        id: select
        shell: bash
        run: |
          if [[ '${{ github.event_name }}' != 'pull_request' ]]; then
            echo 'languages=["go","python","javascript-typescript"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.sha }}' > changed.txt
          go=false
          python=false
          ts=false
          # bash case patterns are not pathname-aware: * matches across '/', so
          # these globs intentionally over-match and analyze an extra language
          # rather than skip one that changed.
          while IFS= read -r path; do
            case "$path" in
              *.go|go.work|go.work.sum|*go.mod|*go.sum) go=true ;;
            esac
            case "$path" in
              *.py|*pyproject.toml|scripts/pythonStyleRequirements.*|scripts/pythonTestRequirements.*) python=true ;;
            esac
            case "$path" in
              *.ts|*.tsx|*.js|*.jsx|*.mjs|*.cjs|package.json|pnpm-lock.yaml|pnpm-workspace.yaml) ts=true ;;
            esac
          done < changed.txt

          langs=()
          [[ "$go" == true ]] && langs+=('"go"')
          [[ "$python" == true ]] && langs+=('"python"')
          [[ "$ts" == true ]] && langs+=('"javascript-typescript"')
          if [[ ${#langs[@]} -eq 0 ]]; then
            langs=('"go"' '"python"' '"javascript-typescript"')
          fi
          joined=$(IFS=,; echo "${langs[*]}")
          echo "languages=[${joined}]" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: setLanguages
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        language: ${{ fromJSON(needs.setLanguages.outputs.languages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: matrix.language == 'go'
        with:
          go-version: '1.26'

      - uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/autobuild@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2

      - uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: /language:${{ matrix.language }}
