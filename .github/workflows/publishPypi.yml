# Publishes selected Python packages to PyPI with trusted publishing.

name: publishPypi

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish.'
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - identity
          - revocation
          - sdk
          - transport-mcp
          - fastmcp
          - redis

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ inputs.package }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.14'

jobs:
  select:
    name: Select packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          set -euo pipefail
          all='[
            {"name":"core","dir":"packages/core/python","pypiName":"caracalai-core"},
            {"name":"identity","dir":"packages/identity/python","pypiName":"caracalai-identity"},
            {"name":"revocation","dir":"packages/revocation/python","pypiName":"caracalai-revocation"},
            {"name":"sdk","dir":"packages/sdk/python","pypiName":"caracalai-sdk"},
            {"name":"transport-mcp","dir":"packages/transport/mcp/python","pypiName":"caracalai-transport-mcp"},
            {"name":"fastmcp","dir":"packages/connectors/fastmcp/python","pypiName":"caracalai-mcp-fastmcp"},
            {"name":"redis","dir":"packages/connectors/redis/python","pypiName":"caracalai-revocation-redis"}
          ]'
          if [[ '${{ inputs.package }}' == 'all' ]]; then
            selected="$all"
          else
            selected="$(jq -c --arg name '${{ inputs.package }}' '[.[] | select(.name == $name)]' <<< "$all")"
          fi
          {
            echo 'matrix<<JSON'
            jq -c '{include: .}' <<< "$selected"
            echo JSON
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'Garudex-Labs/caracal'
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.pypiName }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build distribution
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          python -m pip install --require-hashes --requirement "$GITHUB_WORKSPACE/scripts/publishPypiRequirements.lock"
          rm -rf dist build *.egg-info
          python -m build
          twine check dist/*

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ matrix.dir }}/dist
          skip-existing: true
