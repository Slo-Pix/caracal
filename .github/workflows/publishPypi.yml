#
# Publishes selected Python packages to PyPI with trusted publishing.

name: publishPypi

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package selection.'
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all
          - core
          - oauth
          - identity
          - revocation
          - sdk
          - transport-mcp
          - fastmcp
          - redis
      baseRef:
        description: 'Optional git diff base. Empty uses the latest reachable release tag.'
        required: false
        default: ''
        type: string
      dryRun:
        description: 'Build and check distributions without publishing.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ inputs.package }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.14'

jobs:
  select:
    name: Select packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      hasPackages: ${{ steps.matrix.outputs.hasPackages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate dispatch ref and actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" && ! "${GITHUB_REF_NAME}" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::PyPI publishing must run from ${{ github.event.repository.default_branch }} or a Caracal release tag."
            exit 1
          fi
          actor="${{ github.actor }}"
          maintainers="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/MAINTAINERS?ref=${{ github.event.repository.default_branch }}" --jq '.content' | base64 -d > "$maintainers"
          if ! grep -Eo '@[[:alnum:]_-]+' "$maintainers" | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS on ${{ github.event.repository.default_branch }} and cannot publish PyPI packages."
            exit 1
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: matrix
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          BASE_REF: ${{ inputs.baseRef }}
        run: |
          set -euo pipefail
          args=(--ecosystem pypi --format github-matrix)
          if [[ "$PACKAGE" == 'all' ]]; then
            args+=(--all-packages)
          elif [[ -n "$BASE_REF" ]]; then
            args+=(--since "$BASE_REF")
          fi
          if [[ "$PACKAGE" != 'all' && "$PACKAGE" != 'changed' ]]; then
            args+=(--package "$PACKAGE")
          fi
          selected="$(node scripts/releasePlan.mjs "${args[@]}")"
          hasPackages="$(node -e "const m = JSON.parse(process.argv[1]); console.log(m.include.length > 0 ? 'true' : 'false')" "$selected")"
          {
            echo 'matrix<<JSON'
            printf '%s\n' "$selected"
            echo JSON
            echo "hasPackages=$hasPackages"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true'
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build distribution
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Refusing to publish dev-stamped version ${ver} from ${{ matrix.dir }}"
            exit 1
          fi
          python -m pip install --require-hashes --requirement "$GITHUB_WORKSPACE/scripts/publishPypiRequirements.lock"
          rm -rf dist build *.egg-info
          python -m build
          twine check dist/*

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        if: inputs.dryRun != true
        with:
          packages-dir: ${{ matrix.dir }}/dist
          skip-existing: true

      - name: Verify published package
        if: inputs.dryRun != true
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(awk -F'"' '/^name = /{print $2; exit}' pyproject.toml)"
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          python - "$name" "$ver" <<'PY'
          import json
          import sys
          import urllib.request

          name, expected = sys.argv[1:]
          with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/json", timeout=30) as response:
              body = json.load(response)
          versions = body.get("releases", {})
          if expected not in versions:
              raise SystemExit(f"{name}=={expected} is missing from PyPI releases")
          PY

      - name: Dry-run summary
        if: inputs.dryRun == true
        working-directory: ${{ matrix.dir }}
        run: |
          name="$(awk -F'"' '/^name = /{print $2; exit}' pyproject.toml)"
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          echo "Validated PyPI package ${name}==${ver} without publishing."
