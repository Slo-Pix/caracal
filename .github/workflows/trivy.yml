# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: trivy

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '22 0 * * 6'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - name: sts
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=sts
              PORT=8080
              STATE_DIRS=audit-replay
          - name: gateway
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=gateway
              PORT=8081
          - name: audit
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=audit
              PORT=9090
          - name: coordinator
            context: .
            dockerfile: apps/coordinator/Dockerfile
            build_args: ""
          - name: control
            context: .
            dockerfile: apps/control/Dockerfile
            build_args: ""
          - name: postgres
            context: infra/postgres
            dockerfile: infra/postgres/Dockerfile
            build_args: ""
          - name: redis
            context: infra/redis
            dockerfile: infra/redis/Dockerfile
            build_args: ""
          - name: runtime
            context: .
            dockerfile: apps/runtime/Dockerfile
            build_args: |
              CARACAL_RELEASE_VERSION=0.0.0-ci
              CARACAL_DEV_SHA=${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
          BUILD_CONTEXT: ${{ matrix.context }}
          BUILD_DOCKERFILE: ${{ matrix.dockerfile }}
          BUILD_ARGS: ${{ matrix.build_args }}
          IMAGE_TAG: caracal-${{ matrix.name }}:${{ github.sha }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r arg; do
            if [ -n "$arg" ]; then
              args+=(--build-arg "$arg")
            fi
          done <<< "$BUILD_ARGS"
          for attempt in 1 2 3; do
            if docker build --file "$BUILD_DOCKERFILE" --tag "$IMAGE_TAG" "${args[@]}" "$BUILD_CONTEXT"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
        with:
          image-ref: 'caracal-${{ matrix.name }}:${{ github.sha }}'
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-results-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.name }}.sarif'
          category: 'trivy-${{ matrix.name }}'
