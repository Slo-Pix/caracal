# Validates published Caracal release artifacts and opens a report PR.

name: Post-Release Validation

on:
  workflow_dispatch:
    inputs:
      release:
        description: Release tag, such as v2026.06.20-rc.1 or v2026.06.04.
        required: true
        type: string
  workflow_call:
    inputs:
      release:
        description: Release tag, such as v2026.06.20-rc.1 or v2026.06.04.
        required: true
        type: string

permissions:
  contents: read
  packages: read
  attestations: read

concurrency:
  group: post-release-${{ inputs.release }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.14'
  PNPM_VERSION: '11.1.1'
  UV_VERSION: '0.11.14'
  POETRY_VERSION: '2.4.1'
  FINDINGS_DIR: findings

jobs:
  authorize:
    name: Authorize validation
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate release and actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release }}
        run: |
          set -euo pipefail
          if ! echo "$RELEASE_TAG" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$'; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          actor="${{ github.actor }}"
          maintainers="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/MAINTAINERS?ref=${{ github.event.repository.default_branch }}" --jq '.content' | base64 -d > "$maintainers"
          if ! grep -Eo '@[[:alnum:]_-]+' "$maintainers" | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS on ${{ github.event.repository.default_branch }} and cannot run post-release validation."
            exit 1
          fi

  registryMetadata:
    name: Registry metadata
    if: github.repository == 'Garudex-Labs/caracal'
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validateRegistryMetadata.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-registry
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  pypiInstall:
    name: PyPI (${{ matrix.os }}, ${{ matrix.pm }})
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ${{ matrix.os }}
    needs: registryMetadata
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        pm: [pip, uv]
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
      PM: ${{ matrix.pm }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - if: matrix.pm == 'uv' || matrix.pm == 'poetry'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - if: matrix.pm == 'poetry'
        env:
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/uv-tools
        run: |
          mkdir -p "$UV_TOOL_BIN_DIR"
          echo "$UV_TOOL_BIN_DIR" >> "$GITHUB_PATH"
          uv tool install "poetry==${POETRY_VERSION}"

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validatePypiInstall.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-pypi-${{ matrix.os }}-${{ matrix.pm }}
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  npmInstall:
    name: npm (${{ matrix.os }}, ${{ matrix.pm }})
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ${{ matrix.os }}
    needs: registryMetadata
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        pm: [npm, pnpm]
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
      PM: ${{ matrix.pm }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - if: matrix.pm == 'yarn'
        run: corepack enable && corepack prepare yarn@4 --activate

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validateNpmInstall.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-npm-${{ matrix.os }}-${{ matrix.pm }}
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  cliAndTui:
    name: Binaries (${{ matrix.os }})
    if: github.repository == 'Garudex-Labs/caracal'
    needs: authorize
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: mkdir -p "$FINDINGS_DIR"

      - run: bash scripts/postRelease/validateRuntimeBinaries.sh

      - run: bash scripts/postRelease/validateConsoleBinaries.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-binaries-${{ matrix.os }}
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  installers:
    name: Installers (${{ matrix.os }})
    if: github.repository == 'Garudex-Labs/caracal'
    needs: authorize
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validateInstallers.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-installers-${{ matrix.os }}
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  containers:
    name: Containers
    if: github.repository == 'Garudex-Labs/caracal'
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validateContainers.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-containers
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  provenance:
    name: Provenance
    if: github.repository == 'Garudex-Labs/caracal'
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - run: mkdir -p "$FINDINGS_DIR" && bash scripts/postRelease/validateProvenance.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-provenance
          path: findings/*.jsonl
          if-no-files-found: error
          retention-days: 14

  aggregate:
    name: Aggregate report
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    needs:
      - authorize
      - registryMetadata
      - pypiInstall
      - npmInstall
      - cliAndTui
      - installers
      - containers
      - provenance
    if: always() && github.repository == 'Garudex-Labs/caracal' && needs.authorize.result == 'success'
    timeout-minutes: 10
    env:
      CARACAL_RELEASE: ${{ inputs.release }}
      FINDINGS_DIR: ${{ github.workspace }}/findings
      MANIFEST: ${{ github.workspace }}/releases/${{ inputs.release }}/manifest.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: findings
          pattern: findings-*

      - id: report
        run: bun scripts/postRelease/aggregateReport.ts

      - id: report-pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: release-validation/${{ inputs.release }}
          title: 'release-validation: ${{ inputs.release }} report'
          labels: release-validation
          commit-message: 'release-validation: ${{ inputs.release }} report'
          add-paths: docs/src/data/releases/

      - if: steps.report-pr.outcome == 'failure'
        run: |
          echo 'Report PR creation is unavailable to GitHub Actions in this repository.'
          echo 'The release-validation branch was still updated when branch push permissions allowed it.'

      - if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          echo 'One or more post-release validation jobs failed before aggregation.'
          exit 1
