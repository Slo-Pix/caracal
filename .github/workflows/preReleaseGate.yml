#
# Reusable pre-tag validation gate run before any release tag is pushed.

name: preReleaseGate

on:
  workflow_call:
    inputs:
      releaseTag:
        description: 'Release tag to validate, such as v2026.06.09-rc.1.'
        required: true
        type: string
      ref:
        description: 'Git ref to check out for validation.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'

jobs:
  gate:
    name: Pre-tag gate
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch default branch
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch --no-tags origin "${default_branch}:refs/remotes/origin/${default_branch}"
          if [[ "$(git branch --show-current)" != "$default_branch" ]]; then
            git branch --force "$default_branch" "origin/${default_branch}"
          fi

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Stamp drift
        run: node scripts/release.mjs stamp --check

      - name: Changesets ignore drift
        run: node scripts/generateChangesetsIgnore.mjs --check

      - name: Changeset status
        run: pnpm changeset status

      - name: Manifest exists
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          set -euo pipefail
          manifest="releases/${RELEASE_TAG}/manifest.json"
          if [[ ! -f "$manifest" ]]; then
            echo "::error::missing manifest: $manifest"
            exit 1
          fi
          echo "MANIFEST=$manifest" >> "$GITHUB_ENV"

      - name: Validate manifest
        run: node scripts/validateReleaseManifest.mjs "$MANIFEST"

      - name: Release tag matches
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          set -euo pipefail
          got="$(node -e "console.log(require('./'+process.env.MANIFEST).release)")"
          if [[ "$got" != "$RELEASE_TAG" ]]; then
            echo "::error::manifest release $got does not match $RELEASE_TAG"
            exit 1
          fi
