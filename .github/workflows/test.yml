#
# Validates the Caracal monorepo across TypeScript, Go, Python, and documentation builds.

name: test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - '.prettierrc.json'
      - 'scripts/checkStyle.sh'
      - 'scripts/pythonStyleRequirements.in'
      - 'scripts/pythonStyleRequirements.lock'
      - 'scripts/pythonTestRequirements.in'
      - 'scripts/pythonTestRequirements.lock'
      - 'scripts/setupDev.mjs'
      - 'apps/**'
      - 'docs/**'
      - 'infra/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - '.prettierrc.json'
      - 'scripts/checkStyle.sh'
      - 'scripts/pythonStyleRequirements.in'
      - 'scripts/pythonStyleRequirements.lock'
      - 'scripts/pythonTestRequirements.in'
      - 'scripts/pythonTestRequirements.lock'
      - 'scripts/setupDev.mjs'
      - 'apps/**'
      - 'docs/**'
      - 'infra/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'
  BUN_VERSION: '1.3.14'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.14'
  GOTOOLCHAIN: auto
  ASTRO_TELEMETRY_DISABLED: '1'
  CI: true

jobs:
  smoke:
    name: Post-merge smoke
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: TypeScript build (topological)
        run: pnpm -r build

      - name: Go vet
        run: |
          go vet \
            ./packages/core/go/... \
            ./services/sts/... \
            ./services/audit/... \
            ./services/gateway/... \
            ./services/coordinator-relay/... \
            ./packages/transport/mcp/go/... \
            ./packages/connectors/nethttp/go/... \
            ./packages/connectors/redis/go/... \
            ./packages/identity/go/... \
            ./packages/oauth/go/... \
            ./packages/revocation/go/... \
            ./packages/sdk/go/...

  changes:
    name: Detect changes
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      typescript: ${{ steps.paths.outputs.typescript }}
      go: ${{ steps.paths.outputs.go }}
      python: ${{ steps.paths.outputs.python }}
      style: ${{ steps.paths.outputs.style }}
      docs: ${{ steps.paths.outputs.docs }}
      postgres: ${{ steps.paths.outputs.postgres }}
      helm: ${{ steps.paths.outputs.helm }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: paths
        shell: bash
        run: |
          {
            if [[ '${{ github.event_name }}' != 'pull_request' ]]; then
              echo 'typescript=true'
              echo 'go=true'
              echo 'python=true'
              echo 'style=true'
              echo 'docs=true'
              echo 'postgres=true'
              echo 'helm=true'
              exit 0
            fi

            git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.sha }}' > changed.txt
            typescript=false
            go=false
            python=false
            style=false
            docs=false
            postgres=false
            helm=false
            while IFS= read -r path; do
              case "$path" in
                .github/workflows/test.yml|.prettierrc.json|scripts/checkStyle.sh|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|apps/**|packages/engine/**|packages/*/ts/**|packages/connectors/*/ts/**|packages/transport/*/ts/**|tests/typescript/**)
                  typescript=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|go.work|go.work.sum|services/**|packages/*/go/**|packages/connectors/*/go/**|packages/transport/*/go/**|tests/go/**|tests/source/go/**)
                  go=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|scripts/pythonStyleRequirements.in|scripts/pythonStyleRequirements.lock|scripts/setupDev.mjs|packages/*/python/**|packages/connectors/*/python/**|packages/transport/*/python/**|tests/python/**|tests/shared/test-utils/python/**)
                  python=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|docs/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml)
                  docs=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|infra/postgres/**)
                  postgres=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|infra/helm/**)
                  helm=true
                  ;;
              esac
            done < changed.txt

            echo "typescript=$typescript"
            echo "go=$go"
            echo "python=$python"
            echo "style=$style"
            echo "docs=$docs"
            echo "postgres=$postgres"
            echo "helm=$helm"
          } >> "$GITHUB_OUTPUT"

  style:
    name: Style checks
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.style == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/pythonStyleRequirements.lock

      - name: Install style dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          python -m pip install --require-hashes --requirement scripts/pythonStyleRequirements.lock

      - name: Check changed source style
        env:
          STYLE_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: pnpm run style

  typescript:
    name: TypeScript lint, types, tests, build
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://caracal:caracal@localhost:5432/caracal
      REDIS_URL: redis://localhost:6379
      STS_URL: http://localhost:3001
      ISSUER_URL: http://localhost:4000
      AGENT_COORDINATOR_SCOPE: agent:coordinate
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate runtime embedded assets
        run: pnpm --dir apps/runtime sync-embedded

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Run lint scripts
        run: pnpm -r --if-present lint

      - name: Run type checks
        run: pnpm -r --if-present typecheck

      - name: Run TypeScript tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          run_pkg() {
            local dir="$1"
            local out="$2"
            shift 2
            echo "::group::vitest ${out}"
            pnpm --dir "${dir}" exec vitest run --root "${GITHUB_WORKSPACE}" \
              --coverage.enabled true \
              --coverage.provider=v8 \
              --coverage.reporter=lcov \
              --coverage.reportsDirectory="${GITHUB_WORKSPACE}/coverage/typescript/${out}" \
              "$@"
            echo "::endgroup::"
          }
          run_pkg apps/api api \
            tests/typescript/unit/api \
            tests/typescript/security/api \
            tests/typescript/property/api \
            tests/typescript/contract/api \
            tests/typescript/fuzz/api \
            tests/typescript/integration/api
          run_pkg apps/coordinator coordinator tests/typescript/unit/orchestration/coordinator
          run_pkg apps/runtime runtime tests/typescript/unit/runtime
          run_pkg apps/console Console tests/typescript/unit/console
          run_pkg packages/core/ts core tests/typescript/unit/shared tests/typescript/contract/interoperability
          run_pkg packages/engine engine tests/typescript/unit/engine
          run_pkg packages/admin/ts admin tests/typescript/unit/admin
          run_pkg packages/sdk/ts sdk \
            tests/typescript/unit/sdk/client.test.ts \
            tests/typescript/unit/sdk/context.test.ts \
            tests/typescript/unit/sdk/http.test.ts \
            tests/typescript/unit/sdk/primitives.test.ts
          run_pkg packages/transport/a2a/ts transport-a2a tests/typescript/unit/transport-a2a
          run_pkg packages/oauth/ts oauth tests/typescript/unit/sdk/oauth
          run_pkg packages/revocation/ts revocation tests/typescript/unit/revocation
          run_pkg packages/transport/mcp/ts transport-mcp tests/typescript/unit/transport-mcp
          run_pkg packages/connectors/express/ts mcp-express tests/typescript/unit/sdk/mcp-express
          run_pkg packages/connectors/fastmcp/ts mcp-fastmcp tests/typescript/unit/sdk/mcp-fastmcp
          run_pkg packages/connectors/postgres/ts tokenstate-postgres tests/typescript/unit/connectors/postgres
          run_pkg packages/connectors/redis/ts tokenstate-redis tests/typescript/unit/connectors/redis
          run_pkg packages/identity/ts identity tests/typescript/unit/identity
          run_pkg apps/control control tests/typescript/unit/control tests/typescript/integration/control

      - name: List TypeScript coverage outputs
        if: always()
        shell: bash
        run: |
          echo 'Coverage tree:'
          ls -laR coverage/typescript 2>&1 || echo 'coverage/typescript missing'

      - name: Upload TypeScript coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-typescript
          path: coverage/typescript/**/lcov.info
          if-no-files-found: error
          retention-days: 7

  go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Run Go tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/go
          bash scripts/runGoSourceTests.sh go test -race -covermode=atomic -coverprofile=coverage/go/coverage.out \
            ./packages/core/go/... \
            ./services/sts/... \
            ./services/audit/... \
            ./services/gateway/... \
            ./services/coordinator-relay/... \
            ./packages/transport/mcp/go/... \
            ./packages/connectors/nethttp/go/... \
            ./packages/connectors/redis/go/... \
            ./packages/identity/go/... \
            ./packages/oauth/go/... \
            ./packages/revocation/go/... \
            ./packages/sdk/go/...
          go test -race -covermode=atomic \
            -coverpkg=github.com/garudex-labs/caracal/packages/transport/mcp/go,github.com/garudex-labs/caracal/packages/revocation/go,github.com/garudex-labs/caracal/packages/identity/go \
            -coverprofile=coverage/go/tests.out \
            ./tests/go/unit/revocation \
            ./tests/go/unit/transport/mcp \
            ./tests/go/unit/identity \
            ./tests/go/contract/interoperability
          tail -n +2 coverage/go/tests.out >> coverage/go/coverage.out
          go tool cover -func=coverage/go/coverage.out

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-go
          path: coverage/go/coverage.out
          if-no-files-found: error
          retention-days: 7

  python:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            packages/core/python/pyproject.toml
            packages/oauth/python/pyproject.toml
            packages/identity/python/pyproject.toml
            packages/revocation/python/pyproject.toml
            packages/sdk/python/pyproject.toml
            packages/transport/mcp/python/pyproject.toml
            packages/connectors/fastmcp/python/pyproject.toml
            packages/connectors/asgi/python/pyproject.toml
            packages/connectors/redis/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes --requirement scripts/pythonTestRequirements.lock

      - name: Run Python tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/core/python:${{ github.workspace }}/packages/oauth/python:${{ github.workspace }}/packages/identity/python:${{ github.workspace }}/packages/revocation/python:${{ github.workspace }}/packages/sdk/python:${{ github.workspace }}/packages/transport/mcp/python:${{ github.workspace }}/packages/connectors/fastmcp/python:${{ github.workspace }}/packages/connectors/asgi/python:${{ github.workspace }}/packages/connectors/redis/python:${{ github.workspace }}/tests/shared/test-utils/python
        run: |
          set -euxo pipefail
          mkdir -p coverage/python
          coverage run --source=packages/core/python/caracalai_core,packages/oauth/python/caracalai_oauth,packages/identity/python/caracalai_identity,packages/revocation/python/caracalai_revocation,packages/sdk/python/caracalai,packages/transport/mcp/python/caracalai_transport_mcp,packages/connectors/fastmcp/python/caracalai_mcp_fastmcp,packages/connectors/asgi/python/caracalai_asgi,packages/connectors/redis/python/caracalai_revocation_redis \
            -m unittest discover -s tests/python -p 'test_*.py' -v
          coverage xml -o coverage/python/coverage.xml
          coverage report --show-missing

      - name: List Python coverage outputs
        if: always()
        shell: bash
        run: ls -la coverage/python 2>&1 || echo 'coverage/python missing'

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python
          path: coverage/python/coverage.xml
          if-no-files-found: error
          retention-days: 7

  docs:
    name: Docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build static docs
        run: |
          node scripts/validateOpsDocs.mjs
          pnpm --dir docs build

      - name: Verify docs artifact
        run: |
          set -euo pipefail
          test -f docs/dist/index.html
          test -f docs/dist/CNAME
          grep -Fx 'docs.caracal.run' docs/dist/CNAME

  postgres:
    name: PostgreSQL migrations
    needs: changes
    if: needs.changes.outputs.postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
        env:
          POSTGRES_DB: caracal
          POSTGRES_USER: caracal
          POSTGRES_PASSWORD: caracal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caracal -d caracal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Validate migrations
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: caracal
          PGDATABASE: caracal
          PGPASSWORD: caracal
        run: bash infra/postgres/scripts/validateMigrations.sh

  helm:
    name: Helm chart
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Helm chart
        run: bash infra/helm/caracal/scripts/validate.sh

  releaseConfig:
    name: Release config drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Verify version pins
        run: node scripts/release.mjs stamp --check

      - name: Verify Changesets ignore
        run: node scripts/generateChangesetsIgnore.mjs --check

  coverage:
    name: Upload coverage
    needs:
      - typescript
      - go
      - python
    if: always() && !cancelled() && (needs.typescript.result == 'success' || needs.go.result == 'success' || needs.python.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage

      - name: List coverage files
        run: find coverage -maxdepth 4 -type f -print | sort

      - name: Upload TypeScript coverage to Codecov
        if: needs.typescript.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/coverage-typescript
          flags: typescript
          fail_ci_if_error: true

      - name: Upload Go coverage to Codecov
        if: needs.go.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-go/coverage.out
          flags: go
          disable_search: true
          fail_ci_if_error: true

      - name: Upload Python coverage to Codecov
        if: needs.python.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-python/coverage.xml
          flags: python
          disable_search: true
          fail_ci_if_error: true

  status:
    name: Test status
    needs:
      - smoke
      - changes
      - typescript
      - go
      - python
      - docs
      - postgres
      - helm
      - releaseConfig
      - coverage
    if: always() && github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in '${{ needs.smoke.result }}' '${{ needs.changes.result }}' '${{ needs.typescript.result }}' '${{ needs.go.result }}' '${{ needs.python.result }}' '${{ needs.docs.result }}' '${{ needs.postgres.result }}' '${{ needs.helm.result }}' '${{ needs.releaseConfig.result }}' '${{ needs.coverage.result }}'; do
            if [[ "$result" == 'failure' || "$result" == 'cancelled' ]]; then
              echo "A required test workflow job ended with $result."
              exit 1
            fi
          done
          echo 'All required test workflow jobs passed or were skipped.'
