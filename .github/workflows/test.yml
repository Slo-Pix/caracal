#
# Validates the Caracal monorepo across TypeScript, Go, Python, and documentation builds.

name: test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.28.0'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.11'
  GOTOOLCHAIN: auto
  ASTRO_TELEMETRY_DISABLED: '1'
  CI: true

jobs:
  smoke:
    name: Post-merge smoke
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: TypeScript build (topological)
        run: pnpm -r build

      - name: Go vet
        run: |
          go vet \
            ./packages/core/go/... \
            ./services/sts/... \
            ./services/audit/... \
            ./services/gateway/... \
            ./apps/coordinator/relay/... \
            ./packages/transport/mcp/go/... \
            ./packages/connectors/nethttp/go/... \
            ./packages/identity/go/... \
            ./packages/revocation/go/... \
            ./packages/sdk/go/...

  changes:
    name: Detect changes
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      typescript: ${{ steps.paths.outputs.typescript }}
      go: ${{ steps.paths.outputs.go }}
      python: ${{ steps.paths.outputs.python }}
      docs: ${{ steps.paths.outputs.docs }}
    steps:
      - name: Set run-all outputs
        id: paths
        shell: bash
        run: |
          {
            echo 'typescript=true'
            echo 'go=true'
            echo 'python=true'
            echo 'docs=true'
          } >> "$GITHUB_OUTPUT"

  typescript:
    name: TypeScript lint, types, tests, build
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://caracal:caracal@localhost:5432/caracal
      REDIS_URL: redis://localhost:6379
      STS_URL: http://localhost:3001
      ISSUER_URL: http://localhost:4000
      AGENT_COORDINATOR_AUDIENCE: caracal-coordinator
      AGENT_COORDINATOR_SCOPE: agent:coordinate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate CLI embedded assets
        run: pnpm --dir apps/cli sync-embedded

      - name: Build TypeScript packages
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir packages/core/ts build
          pnpm --dir packages/oauth/ts build
          pnpm --dir packages/admin/ts build
          pnpm --dir packages/sdk/ts build
          pnpm --dir packages/transport/a2a/ts build
          pnpm --dir packages/identity/ts build
          pnpm --dir packages/revocation/ts build
          pnpm --dir packages/transport/mcp/ts build
          pnpm --dir packages/connectors/express/ts build
          pnpm --dir packages/connectors/fastmcp/ts build
          pnpm --dir packages/connectors/postgres/ts build
          pnpm --dir apps/api build
          pnpm --dir apps/coordinator build

      - name: Run lint scripts
        run: pnpm -r --if-present lint

      - name: Run type checks
        run: pnpm -r --if-present typecheck

      - name: Run TypeScript tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          run_pkg() {
            local dir="$1"
            local out="$2"
            shift 2
            echo "::group::vitest ${out}"
            pnpm --dir "${dir}" exec vitest run --root "${GITHUB_WORKSPACE}" \
              --coverage.enabled true \
              --coverage.provider=v8 \
              --coverage.reporter=lcov \
              --coverage.reportsDirectory="${GITHUB_WORKSPACE}/coverage/typescript/${out}" \
              "$@"
            echo "::endgroup::"
          }
          run_pkg apps/api api \
            tests/typescript/unit/api \
            tests/typescript/security/api \
            tests/typescript/property/api \
            tests/typescript/contract/api \
            tests/typescript/fuzz/api \
            tests/typescript/integration/api
          run_pkg apps/coordinator coordinator tests/typescript/unit/orchestration/coordinator
          run_pkg apps/cli cli tests/typescript/unit/cli
          run_pkg apps/tui tui tests/typescript/unit/tui
          run_pkg packages/core/ts core tests/typescript/unit/shared
          run_pkg packages/admin/ts admin tests/typescript/unit/admin
          run_pkg packages/sdk/ts sdk tests/typescript/unit/sdk/client.test.ts
          run_pkg packages/transport/a2a/ts transport-a2a tests/typescript/unit/transport-a2a
          run_pkg packages/oauth/ts oauth tests/typescript/unit/sdk/oauth
          run_pkg packages/revocation/ts revocation tests/typescript/unit/revocation
          run_pkg packages/transport/mcp/ts transport-mcp tests/typescript/unit/transport-mcp
          run_pkg packages/connectors/express/ts mcp-express tests/typescript/unit/sdk/mcp-express
          run_pkg packages/connectors/fastmcp/ts mcp-fastmcp tests/typescript/unit/sdk/mcp-fastmcp
          run_pkg packages/connectors/postgres/ts tokenstate-postgres tests/typescript/unit/connectors/postgres
          run_pkg packages/identity/ts identity tests/typescript/unit/identity

      - name: List TypeScript coverage outputs
        if: always()
        shell: bash
        run: |
          echo 'Coverage tree:'
          ls -laR coverage/typescript 2>&1 || echo 'coverage/typescript missing'

      - name: Upload TypeScript coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-typescript
          path: coverage/typescript/**/lcov.info
          if-no-files-found: error
          retention-days: 7

  go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Run Go tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/go
          go test -race -covermode=atomic -coverprofile=coverage/go/coverage.out \
            ./packages/core/go/... \
            ./services/sts/... \
            ./services/audit/... \
            ./services/gateway/... \
            ./apps/coordinator/relay/... \
            ./packages/transport/mcp/go/... \
            ./packages/connectors/nethttp/go/... \
            ./packages/identity/go/... \
            ./packages/revocation/go/... \
            ./packages/sdk/go/...
          go test -race -covermode=atomic \
            -coverpkg=github.com/garudex-labs/caracal/transport-mcp,github.com/garudex-labs/caracal/revocation,github.com/garudex-labs/caracal/identity \
            -coverprofile=coverage/go/tests.out \
            ./tests/go/unit/revocation \
            ./tests/go/unit/transport/mcp \
            ./tests/go/unit/identity
          tail -n +2 coverage/go/tests.out >> coverage/go/coverage.out
          go tool cover -func=coverage/go/coverage.out

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-go
          path: coverage/go/coverage.out
          if-no-files-found: error
          retention-days: 7

  python:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            packages/core/python/pyproject.toml
            packages/identity/python/pyproject.toml
            packages/revocation/python/pyproject.toml
            packages/sdk/python/pyproject.toml
            packages/transport/mcp/python/pyproject.toml
            packages/connectors/fastmcp/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install \
            -e packages/core/python \
            -e packages/identity/python \
            -e packages/revocation/python \
            -e packages/sdk/python \
            -e packages/transport/mcp/python \
            -e packages/connectors/fastmcp/python \
            coverage==7.13.5 cryptography==48.0.0

      - name: Run Python tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/core/python:${{ github.workspace }}/packages/identity/python:${{ github.workspace }}/packages/revocation/python:${{ github.workspace }}/packages/sdk/python:${{ github.workspace }}/packages/transport/mcp/python:${{ github.workspace }}/packages/connectors/fastmcp/python:${{ github.workspace }}/tests/shared/test-utils/python
        run: |
          set -euxo pipefail
          mkdir -p coverage/python
          coverage run --source=packages/core/python/caracalai_core,packages/identity/python/caracalai_identity,packages/revocation/python/caracalai_revocation,packages/sdk/python/caracalai_sdk,packages/transport/mcp/python/caracalai_transport_mcp,packages/connectors/fastmcp/python/caracalai_mcp_fastmcp \
            -m unittest discover -s tests/python -p 'test_*.py' -v
          coverage xml -o coverage/python/coverage.xml
          coverage report --show-missing

      - name: List Python coverage outputs
        if: always()
        shell: bash
        run: ls -la coverage/python 2>&1 || echo 'coverage/python missing'

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-python
          path: coverage/python/coverage.xml
          if-no-files-found: error
          retention-days: 7

  docs:
    name: Docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build static docs
        run: pnpm --dir docs build

      - name: Verify docs artifact
        run: |
          set -euo pipefail
          test -f docs/dist/index.html
          test -f docs/dist/CNAME
          grep -Fx 'docs.garudexlabs.com' docs/dist/CNAME

  coverage:
    name: Upload coverage
    needs:
      - typescript
      - go
      - python
    if: always() && !cancelled() && (needs.typescript.result == 'success' || needs.go.result == 'success' || needs.python.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*
          path: coverage

      - name: List coverage files
        run: find coverage -maxdepth 4 -type f -print | sort

      - name: Upload TypeScript coverage to Codecov
        if: needs.typescript.result == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/coverage-typescript
          flags: typescript
          fail_ci_if_error: false

      - name: Upload Go coverage to Codecov
        if: needs.go.result == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-go/coverage.out
          flags: go
          disable_search: true
          fail_ci_if_error: false

      - name: Upload Python coverage to Codecov
        if: needs.python.result == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-python/coverage.xml
          flags: python
          disable_search: true
          fail_ci_if_error: false

  status:
    name: Test status
    needs:
      - smoke
      - changes
      - typescript
      - go
      - python
      - docs
      - coverage
    if: always() && github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in '${{ needs.smoke.result }}' '${{ needs.changes.result }}' '${{ needs.typescript.result }}' '${{ needs.go.result }}' '${{ needs.python.result }}' '${{ needs.docs.result }}' '${{ needs.coverage.result }}'; do
            if [[ "$result" == 'failure' || "$result" == 'cancelled' ]]; then
              echo "A required test workflow job ended with $result."
              exit 1
            fi
          done
          echo 'All required test workflow jobs passed or were skipped.'
