# Caracal, a product of Garudex Labs
#
# Release pipeline: builds CLI binaries, pushes runtime images to GHCR, and creates the GitHub Release on CalVer tags. Npm and PyPI packages are published locally via scripts/publishNpm.sh and scripts/publishPypi.sh.

name: release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]+'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to release from (defaults to current)'
        required: false
        default: ''
      dryRun:
        description: 'Dry run: build and stage artifacts without publishing'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.0.9'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.12'
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  check-maintainer:
    name: Verify release actor is a maintainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Check actor against MAINTAINERS
        run: |
          set -euo pipefail
          actor="${{ github.actor }}"
          if ! grep -oP '(?<=@)\S+' .github/MAINTAINERS | grep -qiF "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS and cannot trigger a release."
            exit 1
          fi
          echo "$actor is an authorised maintainer."

      - name: Validate tag format
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if ! echo "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match CalVer format vYYYY.MM.DD or vYYYY.MM.DD.N"
            exit 1
          fi

  cli:
    name: Build CLI and TUI binaries
    needs: check-maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Resolve release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(date -u +%Y.%m.%d)-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Stamp CLI version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          printf '%s\n' \
            '// Copyright (C) 2026 Garudex Labs.  All Rights Reserved.' \
            '// Caracal, a product of Garudex Labs' \
            '//' \
            '// CLI version constant; CI rewrites this from the release tag before bun --compile.' \
            '' \
            "export const CARACAL_VERSION = '${VERSION}'" \
            > apps/cli/src/runtime/version.ts
          jq --arg v "${VERSION}" '.version = $v' apps/cli/package.json > apps/cli/package.json.tmp
          mv apps/cli/package.json.tmp apps/cli/package.json
          echo "Stamped version ${VERSION} into CLI"

      - name: Build CLI binaries
        run: pnpm --dir apps/cli build

      - name: Build TUI binaries
        run: pnpm --dir apps/tui build

      - name: Package release archives
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          tag="v${VERSION}"
          targets='cli:linux:amd64:x64 cli:linux:arm64:arm64 cli:darwin:amd64:x64 cli:darwin:arm64:arm64 cli:windows:amd64:x64 tui:linux:amd64:x64 tui:linux:arm64:arm64 tui:darwin:amd64:x64 tui:darwin:arm64:arm64 tui:windows:amd64:x64'
          for entry in $targets; do
            IFS=: read -r kind os arch bunArch <<EOF
          ${entry}
          EOF
            ext=''
            [ "$os" = windows ] && ext='.exe'
            case "$kind" in
              cli) srcDir=apps/cli/dist; srcBase=caracal; binName=caracal ;;
              tui) srcDir=apps/tui/dist; srcBase=caracal-tui; binName=caracal-tui ;;
            esac
            src="${srcDir}/${srcBase}-${os}-${bunArch}${ext}"
            [ -f "$src" ] || { echo "::error::missing source binary: ${src}"; exit 1; }
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}${ext}"
            chmod +x "${stage}/${binName}${ext}" 2>/dev/null || true
            name="caracal-${kind}-${os}-${arch}-${tag}"
            if [ "$os" = windows ]; then
              (cd "$stage" && zip -q "${name}.zip" "${binName}${ext}")
              mv "${stage}/${name}.zip" release-dist/
            else
              tar -czf "release-dist/${name}.tar.gz" -C "$stage" "${binName}"
            fi
            rm -rf "$stage"
          done
          echo "Packaged archives:"
          ls -la release-dist/

      - name: Smoke test linux-amd64 archives
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          work="$(mktemp -d)"

          tar -xzf "release-dist/caracal-cli-linux-amd64-${tag}.tar.gz" -C "$work"
          "${work}/caracal" --help
          echo "CLI smoke test passed"

          tar -xzf "release-dist/caracal-tui-linux-amd64-${tag}.tar.gz" -C "$work"
          tui_exit=0
          "${work}/caracal-tui" 2>/tmp/tui-stderr || tui_exit=$?
          tui_msg="$(cat /tmp/tui-stderr)"
          [ "${tui_exit}" = "1" ] || { echo "::error::TUI exited with code ${tui_exit} (expected 1)"; exit 1; }
          echo "${tui_msg}" | grep -q "not a TTY" || { echo "::error::TUI missing expected no-TTY message; got: ${tui_msg}"; exit 1; }
          echo "TUI smoke test passed"

      - name: Generate checksums
        working-directory: release-dist
        run: |
          set -euo pipefail
          sha256sum caracal-cli-*.tar.gz caracal-cli-*.zip caracal-tui-*.tar.gz caracal-tui-*.zip > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Verify checksums
        working-directory: release-dist
        run: sha256sum --check SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-archives
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: github.event_name == 'push'
        with:
          subject-path: |
            release-dist/caracal-cli-*
            release-dist/caracal-tui-*

  images:
    name: Build and push container images
    needs: check-maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: sts
            context: .
            dockerfile: services/sts/Dockerfile
          - name: gateway
            context: .
            dockerfile: services/gateway/Dockerfile
          - name: audit
            context: .
            dockerfile: services/audit/Dockerfile
          - name: coordinator
            context: .
            dockerfile: apps/coordinator/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name == 'push' && inputs.dryRun != true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=match,pattern=v(\d+\.\d+)\.\d+(\.\d+)?,group=1,prefix=v
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=dryrun,enable=${{ github.event_name != 'push' }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && inputs.dryRun != true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Create GitHub Release
    needs: [cli, images]
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push' && inputs.dryRun != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-archives
          path: dist

      - name: Verify release assets
        run: |
          set -euo pipefail
          echo "Release assets:"
          ls -la dist/
          tag="${GITHUB_REF_NAME}"
          for asset in \
            "dist/caracal-cli-linux-amd64-${tag}.tar.gz" \
            "dist/caracal-cli-linux-arm64-${tag}.tar.gz" \
            "dist/caracal-cli-darwin-amd64-${tag}.tar.gz" \
            "dist/caracal-cli-darwin-arm64-${tag}.tar.gz" \
            "dist/caracal-cli-windows-amd64-${tag}.zip" \
            "dist/caracal-tui-linux-amd64-${tag}.tar.gz" \
            "dist/caracal-tui-linux-arm64-${tag}.tar.gz" \
            "dist/caracal-tui-darwin-amd64-${tag}.tar.gz" \
            "dist/caracal-tui-darwin-arm64-${tag}.tar.gz" \
            "dist/caracal-tui-windows-amd64-${tag}.zip" \
            "dist/SHA256SUMS"
          do
            [ -f "${asset}" ] || { echo "::error::Missing release asset: ${asset}"; exit 1; }
          done
          echo "All release assets present"

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/caracal-cli-*
            dist/caracal-tui-*
            dist/SHA256SUMS
            install.sh
            install.ps1
