# Caracal, a product of Garudex Labs
#
# Release pipeline: builds CLI binaries, publishes npm/PyPI packages, pushes runtime images to GHCR, and creates the GitHub Release on CalVer tags.

name: release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]+'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to release from (defaults to current)'
        required: false
        default: ''
      dryRun:
        description: 'Dry run: build and stage artifacts without publishing'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.0.9'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.12'
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  check-maintainer:
    name: Verify release actor is a maintainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Check actor against MAINTAINERS
        run: |
          set -euo pipefail
          actor="${{ github.actor }}"
          if ! grep -oP '(?<=@)\S+' .github/MAINTAINERS | grep -qiF "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS and cannot trigger a release."
            exit 1
          fi
          echo "$actor is an authorised maintainer."

  validate:
    name: Validate and test
    needs: check-maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://caracal:caracal@localhost:5432/caracal
      REDIS_URL: redis://localhost:6379
      STS_URL: http://localhost:3001
      ISSUER_URL: http://localhost:4000
      AGENT_COORDINATOR_AUDIENCE: caracal-coordinator
      AGENT_COORDINATOR_SCOPE: agent:coordinate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Validate tag format
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if ! echo "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match CalVer format vYYYY.MM.DD or vYYYY.MM.DD.N"
            exit 1
          fi

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Python dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install \
            -e packages/core/python \
            -e packages/identity/python \
            -e packages/revocation/python \
            -e packages/sdk/python \
            -e packages/transport/mcp/python \
            -e packages/connectors/fastmcp/python \
            -e packages/connectors/redis/python \
            coverage==7.13.5 cryptography==48.0.0

      - name: Generate CLI embedded assets
        run: pnpm --dir apps/cli sync-embedded

      - name: Build TypeScript packages
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir packages/core/ts build
          pnpm --dir packages/oauth/ts build
          pnpm --dir packages/admin/ts build
          pnpm --dir packages/sdk/ts build
          pnpm --dir packages/transport/a2a/ts build
          pnpm --dir packages/identity/ts build
          pnpm --dir packages/revocation/ts build
          pnpm --dir packages/transport/mcp/ts build
          pnpm --dir packages/connectors/express/ts build
          pnpm --dir packages/connectors/fastmcp/ts build
          pnpm --dir packages/connectors/postgres/ts build
          pnpm --dir packages/connectors/redis/ts build
          pnpm --dir apps/api build
          pnpm --dir apps/coordinator build

      - name: Lint and typecheck
        run: |
          pnpm -r --if-present lint
          pnpm -r --if-present typecheck

      - name: TypeScript tests
        run: pnpm run test:typescript

      - name: Go tests
        run: pnpm run test:go

      - name: Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/core/python:${{ github.workspace }}/packages/identity/python:${{ github.workspace }}/packages/revocation/python:${{ github.workspace }}/packages/sdk/python:${{ github.workspace }}/packages/transport/mcp/python:${{ github.workspace }}/packages/connectors/fastmcp/python:${{ github.workspace }}/packages/connectors/redis/python:${{ github.workspace }}/tests/shared/test-utils/python
        run: pnpm run test:python

  cli:
    name: Build CLI and TUI binaries
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Resolve release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(date -u +%Y.%m.%d)-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Stamp CLI version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          printf '%s\n' \
            '// Copyright (C) 2026 Garudex Labs.  All Rights Reserved.' \
            '// Caracal, a product of Garudex Labs' \
            '//' \
            '// CLI version constant; CI rewrites this from the release tag before bun --compile.' \
            '' \
            "export const CARACAL_VERSION = '${VERSION}'" \
            > apps/cli/src/runtime/version.ts
          jq --arg v "${VERSION}" '.version = $v' apps/cli/package.json > apps/cli/package.json.tmp
          mv apps/cli/package.json.tmp apps/cli/package.json
          echo "Stamped version ${VERSION} into CLI"

      - name: Build CLI binaries
        run: pnpm --dir apps/cli build

      - name: Build TUI binaries
        run: pnpm --dir apps/tui build

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p release-dist
          cp apps/cli/dist/caracal-* release-dist/
          cp apps/tui/dist/caracal-tui-* release-dist/
          echo "Staged artifacts:"
          ls -la release-dist/

      - name: Smoke test linux-x64 binaries
        run: |
          set -euo pipefail
          chmod +x release-dist/caracal-linux-x64 release-dist/caracal-tui-linux-x64

          release-dist/caracal-linux-x64 --help
          echo "CLI smoke test passed"

          tui_exit=0
          release-dist/caracal-tui-linux-x64 2>/tmp/tui-stderr || tui_exit=$?
          tui_msg="$(cat /tmp/tui-stderr)"
          [ "${tui_exit}" = "1" ] || { echo "::error::TUI exited with code ${tui_exit} (expected 1)"; exit 1; }
          echo "${tui_msg}" | grep -q "not a TTY" || { echo "::error::TUI missing expected no-TTY message; got: ${tui_msg}"; exit 1; }
          echo "TUI smoke test passed"

      - name: Generate checksums
        working-directory: release-dist
        run: |
          sha256sum caracal-* caracal-tui-* > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Verify checksums
        working-directory: release-dist
        run: sha256sum --check SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-binaries
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: github.event_name == 'push'
        with:
          subject-path: release-dist/caracal-*

  npm:
    name: Build and publish npm packages
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Publish via Changesets
        if: github.event_name == 'push' && inputs.dryRun != true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: pnpm changeset publish

      - name: Dry-run pack and publish
        if: github.event_name != 'push' || inputs.dryRun == true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/caracal-pack
          pnpm changeset status --since=HEAD~1 || true
          for d in \
            packages/core/ts \
            packages/oauth/ts \
            packages/admin/ts \
            packages/identity/ts \
            packages/revocation/ts \
            packages/sdk/ts \
            packages/transport/mcp/ts \
            packages/transport/a2a/ts \
            packages/connectors/express/ts \
            packages/connectors/fastmcp/ts \
            packages/connectors/postgres/ts \
            packages/connectors/redis/ts
          do
            pnpm --dir "$d" pack --pack-destination /tmp/caracal-pack
            echo "::group::npm publish --dry-run for $d"
            ( cd "$d" && npm publish --dry-run --access public )
            echo "::endgroup::"
          done
          echo "Packed tarballs:"
          ls -la /tmp/caracal-pack

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name != 'push' || inputs.dryRun == true
        with:
          name: npm-tarballs
          path: /tmp/caracal-pack/*.tgz
          if-no-files-found: error
          retention-days: 7

  pypi:
    name: Build and publish PyPI packages
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/core/python
          - packages/identity/python
          - packages/revocation/python
          - packages/sdk/python
          - packages/transport/mcp/python
          - packages/connectors/fastmcp/python
          - packages/connectors/redis/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build sdist and wheel
        working-directory: ${{ matrix.package }}
        run: |
          pip install build==1.2.2
          python -m build

      - name: Verify build artifacts
        working-directory: ${{ matrix.package }}
        run: |
          set -euo pipefail
          echo "Build artifacts:"
          ls -la dist/
          [ "$(ls dist/*.whl 2>/dev/null | wc -l)" -gt 0 ] || { echo "::error::No wheel found in dist/"; exit 1; }
          [ "$(ls dist/*.tar.gz 2>/dev/null | wc -l)" -gt 0 ] || { echo "::error::No sdist found in dist/"; exit 1; }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-${{ strategy.job-index }}
          path: ${{ matrix.package }}/dist/*
          if-no-files-found: error
          retention-days: 7

      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1
        if: github.event_name == 'push' && inputs.dryRun != true
        with:
          packages-dir: ${{ matrix.package }}/dist
          skip-existing: true

      - name: Dry-run publish to TestPyPI
        if: github.event_name != 'push' || inputs.dryRun == true
        working-directory: ${{ matrix.package }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "::warning::TEST_PYPI_API_TOKEN not set; running offline twine check only"
            pip install twine
            twine check dist/*
            exit 0
          fi
          pip install twine
          twine check dist/*
          twine upload --repository-url https://test.pypi.org/legacy/ --skip-existing dist/*

  images:
    name: Build and push container images
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: sts
            context: .
            dockerfile: services/sts/Dockerfile
          - name: gateway
            context: .
            dockerfile: services/gateway/Dockerfile
          - name: audit
            context: .
            dockerfile: services/audit/Dockerfile
          - name: coordinator
            context: .
            dockerfile: apps/coordinator/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name == 'push' && inputs.dryRun != true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=match,pattern=v(\d+\.\d+)\.\d+(\.\d+)?,group=1,prefix=v
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=dryrun,enable=${{ github.event_name != 'push' }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && inputs.dryRun != true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Create GitHub Release
    needs: [cli, npm, pypi, images]
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push' && inputs.dryRun != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-binaries
          path: dist

      - name: Verify release assets
        run: |
          set -euo pipefail
          echo "Release assets:"
          ls -la dist/
          for bin in \
            dist/caracal-linux-x64 \
            dist/caracal-linux-arm64 \
            dist/caracal-darwin-x64 \
            dist/caracal-darwin-arm64 \
            dist/caracal-windows-x64.exe \
            dist/caracal-tui-linux-x64 \
            dist/caracal-tui-linux-arm64 \
            dist/caracal-tui-darwin-x64 \
            dist/caracal-tui-darwin-arm64 \
            dist/caracal-tui-windows-x64.exe \
            dist/SHA256SUMS
          do
            [ -f "${bin}" ] || { echo "::error::Missing release asset: ${bin}"; exit 1; }
          done
          echo "All release assets present"

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/caracal-*
            dist/SHA256SUMS
            install.sh
            install.ps1
