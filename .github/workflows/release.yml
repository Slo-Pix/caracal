# Caracal, a product of Garudex Labs
#
# Release pipeline: builds CLI binaries, pushes runtime images to GHCR, and creates the GitHub Release on CalVer tags. Npm and PyPI packages are published locally via scripts/publishNpm.sh and scripts/publishPypi.sh.
#
# Triggers:
# - Tag push vYYYY.MM.DD[.N]: full release (binaries → GitHub Release, images → GHCR, attestations), then best-effort postReleaseValidation.
# - workflow_dispatch: build-only validation (CLI artifact upload; images built with buildx — no GHCR push). No GitHub Release.
#   Use ref to checkout a branch or tag; leave empty to use the caller's default ref.
# - dryRun is informational for dispatch only (publishing is already gated on tag push).

name: release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag); empty = workflow ref'
        required: false
        default: ''
      dryRun:
        description: 'Note: publishing only happens on tag push; dispatch never publishes'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'
  # Pin Bun for reproducible `bun build --compile` artifacts (bump intentionally on upgrade).
  BUN_VERSION: '1.3.14'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.14'
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  check-maintainer:
    name: Verify release actor is a maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - name: Check actor against MAINTAINERS
        run: |
          set -euo pipefail
          actor="${{ github.actor }}"
          if ! grep -Eo '@[[:alnum:]_-]+' .github/MAINTAINERS | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS and cannot trigger a release."
            exit 1
          fi
          echo "$actor is an authorised maintainer."

      - name: Validate tag format
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if ! echo "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match CalVer format vYYYY.MM.DD or vYYYY.MM.DD.N"
            exit 1
          fi

      - name: Validate release manifest
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          manifest="releases/${GITHUB_REF_NAME}/manifest.json"
          version="${GITHUB_REF_NAME#v}"
          test -f "$manifest" || { echo "::error::Missing release manifest: $manifest"; exit 1; }
          node - "$manifest" "$GITHUB_REF_NAME" "$version" <<'NODE'
          const { readFileSync } = require("node:fs");
          const [manifestPath, release, version] = process.argv.slice(2);
          const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
          if (manifest.release !== release) throw new Error(`manifest release ${manifest.release} does not match ${release}`);
          for (const [kind, value] of Object.entries(manifest.binaries)) {
            if (value !== version) throw new Error(`binary ${kind} version ${value} does not match ${version}`);
          }
          for (const [name, value] of Object.entries(manifest.containers)) {
            if (value !== version) throw new Error(`container ${name} version ${value} does not match ${version}`);
          }
          NODE

  cli:
    name: Build CLI and TUI binaries
    needs: check-maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Toolchain versions
        run: |
          node --version
          pnpm --version
          bun --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Resolve release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(date -u +%Y.%m.%d)-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Stamp CLI version
        env:
          CARACAL_RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          node apps/cli/scripts/stampRelease.mjs
          jq --arg v "${CARACAL_RELEASE_VERSION}" '.version = $v' apps/cli/package.json > apps/cli/package.json.tmp
          mv apps/cli/package.json.tmp apps/cli/package.json
          echo "Stamped version ${CARACAL_RELEASE_VERSION} into CLI"

      - name: Build CLI binaries
        env:
          CARACAL_RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: pnpm --dir apps/cli build

      - name: Stamp TUI version
        env:
          CARACAL_RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          node apps/tui/scripts/stampRelease.mjs
          jq --arg v "${CARACAL_RELEASE_VERSION}" '.version = $v' apps/tui/package.json > apps/tui/package.json.tmp
          mv apps/tui/package.json.tmp apps/tui/package.json
          echo "Stamped version ${CARACAL_RELEASE_VERSION} into TUI"

      - name: Build TUI binaries
        env:
          CARACAL_RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: pnpm --dir apps/tui build

      - name: Package release archives
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          tag="v${VERSION}"
          targets='shell:linux:amd64:x64 shell:linux:arm64:arm64 shell:darwin:amd64:x64 shell:darwin:arm64:arm64 shell:windows:amd64:x64 cli:linux:amd64:x64 cli:linux:arm64:arm64 cli:darwin:amd64:x64 cli:darwin:arm64:arm64 cli:windows:amd64:x64 tui:linux:amd64:x64 tui:linux:arm64:arm64 tui:darwin:amd64:x64 tui:darwin:arm64:arm64 tui:windows:amd64:x64'
          for entry in $targets; do
            IFS=: read -r kind os arch bunArch <<EOF
          ${entry}
          EOF
            ext=''
            [ "$os" = windows ] && ext='.exe'
            case "$kind" in
              shell) srcDir=apps/cli/dist; srcBase=caracal; binName=caracal ;;
              cli) srcDir=apps/cli/dist; srcBase=caracal-cli; binName=caracal-cli ;;
              tui) srcDir=apps/tui/dist; srcBase=caracal-tui; binName=caracal-tui ;;
            esac
            src="${srcDir}/${srcBase}-${os}-${bunArch}${ext}"
            [ -f "$src" ] || { echo "::error::missing source binary: ${src}"; exit 1; }
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}${ext}"
            chmod +x "${stage}/${binName}${ext}" 2>/dev/null || true
            name="caracal-${kind}-${os}-${arch}-${tag}"
            if [ "$os" = windows ]; then
              (cd "$stage" && zip -q "${name}.zip" "${binName}${ext}")
              mv "${stage}/${name}.zip" release-dist/
            else
              tar -czf "release-dist/${name}.tar.gz" -C "$stage" "${binName}"
            fi
            rm -rf "$stage"
          done
          echo "Packaged archives:"
          ls -la release-dist/

      - name: Smoke test linux-amd64 archives
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          work="$(mktemp -d)"

          tar -xzf "release-dist/caracal-shell-linux-amd64-${tag}.tar.gz" -C "$work"
          "${work}/caracal" --help
          echo "Shell smoke test passed"

          tar -xzf "release-dist/caracal-cli-linux-amd64-${tag}.tar.gz" -C "$work"
          "${work}/caracal-cli" --help
          echo "CLI smoke test passed"

          tar -xzf "release-dist/caracal-tui-linux-amd64-${tag}.tar.gz" -C "$work"
          tui_exit=0
          "${work}/caracal-tui" 2>/tmp/tui-stderr || tui_exit=$?
          tui_msg="$(cat /tmp/tui-stderr)"
          [ "${tui_exit}" = "1" ] || { echo "::error::TUI exited with code ${tui_exit} (expected 1)"; exit 1; }
          echo "${tui_msg}" | grep -q "not a TTY" || { echo "::error::TUI missing expected no-TTY message; got: ${tui_msg}"; exit 1; }
          echo "TUI smoke test passed"

      - name: Generate checksums
        working-directory: release-dist
        run: |
          set -euo pipefail
          sha256sum caracal-shell-*.tar.gz caracal-shell-*.zip caracal-cli-*.tar.gz caracal-cli-*.zip caracal-tui-*.tar.gz caracal-tui-*.zip > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Verify checksums
        working-directory: release-dist
        run: sha256sum --check SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-archives
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

      - name: Job summary
        run: |
          {
            echo "## CLI / TUI release build"
            echo ""
            echo "| | |"
            echo "|--|--|"
            echo "| Version | \`${{ steps.ver.outputs.version }}\` |"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo ""
            echo "### Archives"
            echo "\`\`\`"
            ls -la release-dist/ || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: github.event_name == 'push'
        with:
          subject-path: |
            release-dist/caracal-shell-*
            release-dist/caracal-cli-*
            release-dist/caracal-tui-*

  images:
    name: Build and push container images
    needs: check-maintainer
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - name: sts
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=sts
              PORT=8080
              STATE_DIRS=audit-replay
          - name: gateway
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=gateway
              PORT=8081
          - name: audit
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=audit
              PORT=9090
          - name: coordinator
            context: .
            dockerfile: apps/coordinator/Dockerfile
            build_args: ""
          - name: redis
            context: infra/redis
            dockerfile: infra/redis/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=match,pattern=v(\d+\.\d+)\.\d+(\.\d+)?,group=1,prefix=v
            type=raw,value=dispatch-${{ github.run_id }},enable=${{ github.event_name != 'push' }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Create GitHub Release
    needs: [cli, images]
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-archives
          path: dist

      - name: Verify installer scripts
        run: |
          set -euo pipefail
          test -f install.sh
          test -f install.ps1
          test -x install.sh || chmod +x install.sh

      - name: Verify release assets
        run: |
          set -euo pipefail
          echo "Release assets:"
          ls -la dist/
          tag="${GITHUB_REF_NAME}"
          for asset in \
            "dist/caracal-shell-linux-amd64-${tag}.tar.gz" \
            "dist/caracal-shell-linux-arm64-${tag}.tar.gz" \
            "dist/caracal-shell-darwin-amd64-${tag}.tar.gz" \
            "dist/caracal-shell-darwin-arm64-${tag}.tar.gz" \
            "dist/caracal-shell-windows-amd64-${tag}.zip" \
            "dist/caracal-cli-linux-amd64-${tag}.tar.gz" \
            "dist/caracal-cli-linux-arm64-${tag}.tar.gz" \
            "dist/caracal-cli-darwin-amd64-${tag}.tar.gz" \
            "dist/caracal-cli-darwin-arm64-${tag}.tar.gz" \
            "dist/caracal-cli-windows-amd64-${tag}.zip" \
            "dist/caracal-tui-linux-amd64-${tag}.tar.gz" \
            "dist/caracal-tui-linux-arm64-${tag}.tar.gz" \
            "dist/caracal-tui-darwin-amd64-${tag}.tar.gz" \
            "dist/caracal-tui-darwin-arm64-${tag}.tar.gz" \
            "dist/caracal-tui-windows-amd64-${tag}.zip" \
            "dist/SHA256SUMS"
          do
            [ -f "${asset}" ] || { echo "::error::Missing release asset: ${asset}"; exit 1; }
          done
          echo "All release assets present"

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/caracal-shell-*
            dist/caracal-cli-*
            dist/caracal-tui-*
            dist/SHA256SUMS
            install.sh
            install.ps1

      - name: Trigger post-release validation
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh workflow run postReleaseValidation.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f release="${GITHUB_REF_NAME}"; then
            echo "::warning::Could not trigger postReleaseValidation. Run manually: gh workflow run postReleaseValidation.yml -f release=${GITHUB_REF_NAME}"
            exit 1
          fi
