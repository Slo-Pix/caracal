#
# Unified release pipeline for rc and stable Caracal artifacts.

name: release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-rc.*'
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*-rc.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build; empty = workflow ref'
        required: false
        default: ''
        type: string
      releaseVersion:
        description: 'Release tag to dry-run, such as v2026.05.26-rc.1'
        required: true
        type: string
      dryRun:
        description: 'Dispatch release runs must stay dry-run only'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.releaseVersion || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'
  BUN_VERSION: '1.3.14'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.14'
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  context:
    name: Release context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      checkoutRef: ${{ steps.resolve.outputs.checkoutRef }}
      releaseTag: ${{ steps.resolve.outputs.releaseTag }}
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      publish: ${{ steps.resolve.outputs.publish }}
      dryRun: ${{ steps.resolve.outputs.dryRun }}
      promoteStable: ${{ steps.resolve.outputs.promoteStable }}
      sha: ${{ steps.resolve.outputs.sha }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch default branch
        run: git fetch --no-tags origin "${{ github.event.repository.default_branch }}:${{ github.event.repository.default_branch }}"

      - name: Authorize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          actor="${{ github.actor }}"
          maintainers="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/MAINTAINERS?ref=${{ github.event.repository.default_branch }}" --jq '.content' | base64 -d > "$maintainers"
          if ! grep -Eo '@[[:alnum:]_-]+' "$maintainers" | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS on ${{ github.event.repository.default_branch }} and cannot run releases."
            exit 1
          fi

      - name: Resolve release context
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
          DISPATCH_RELEASE: ${{ github.event.inputs.releaseVersion }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dryRun }}
        run: |
          set -euo pipefail
          checkout_ref="${DISPATCH_REF:-${GITHUB_REF}}"
          if [ "$EVENT_NAME" = "push" ]; then
            release_tag="${GITHUB_REF_NAME}"
            publish="true"
            dry_run="false"
          else
            if [ -z "$DISPATCH_RELEASE" ]; then
              echo "::error::workflow_dispatch requires releaseVersion."
              exit 1
            fi
            if [ "$DISPATCH_DRY_RUN" != "true" ]; then
              echo "::error::workflow_dispatch release runs must keep dryRun=true."
              exit 1
            fi
            release_tag="$DISPATCH_RELEASE"
            publish="false"
            dry_run="true"
            default_branch="${{ github.event.repository.default_branch }}"
            if [[ "$checkout_ref" != "$default_branch" && "$checkout_ref" != "refs/heads/$default_branch" && "$checkout_ref" != "refs/tags/$release_tag" ]]; then
              echo "::error::workflow_dispatch ref must be $default_branch or refs/tags/$release_tag."
              exit 1
            fi
          fi
          if ! echo "$release_tag" | grep -qE '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$'; then
            echo "::error::Release tag '${release_tag}' must match vYYYY.MM.DD[.N], vYYYY.MM.DD[.N]-rc.<number>, or vYYYY.MM.DD[.N]-rc.sha<gitsha>."
            exit 1
          fi
          channel="stable"
          promote_stable="$publish"
          if [[ "$release_tag" == *"-rc."* ]]; then
            channel="rc"
            promote_stable="false"
          fi
          {
            echo "checkoutRef=${checkout_ref}"
            echo "releaseTag=${release_tag}"
            echo "version=${release_tag#v}"
            echo "channel=${channel}"
            echo "publish=${publish}"
            echo "dryRun=${dry_run}"
            echo "promoteStable=${promote_stable}"
            echo "sha=$(git rev-parse --short HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release manifest
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.releaseTag }}
        run: |
          set -euo pipefail
          manifest="releases/${RELEASE_TAG}/manifest.json"
          test -f "$manifest" || { echo "::error::Missing release manifest: $manifest"; exit 1; }
          CARACAL_VALIDATE_HELM_FILES=1 node scripts/validateReleaseManifest.mjs "$manifest"

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Stamp drift
        run: node scripts/release.mjs stamp --check

      - name: Changesets ignore drift
        run: node scripts/generateChangesetsIgnore.mjs --check

      - name: Changeset status
        run: pnpm changeset status

  archives:
    name: Build archives
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.context.outputs.checkoutRef }}
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript
        run: pnpm run build:typescript

      - name: Stamp runtime
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: |
          set -euo pipefail
          node apps/runtime/scripts/stampRelease.mjs
          jq --arg v "$CARACAL_RELEASE_VERSION" '.version = $v' apps/runtime/package.json > apps/runtime/package.json.tmp
          mv apps/runtime/package.json.tmp apps/runtime/package.json

      - name: Build runtime
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: pnpm --dir apps/runtime build

      - name: Stamp Console
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: |
          set -euo pipefail
          node apps/console/scripts/stampRelease.mjs
          jq --arg v "$CARACAL_RELEASE_VERSION" '.version = $v' apps/console/package.json > apps/console/package.json.tmp
          mv apps/console/package.json.tmp apps/console/package.json

      - name: Build Console
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: pnpm --dir apps/console build

      - name: Package archives
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          source_date_epoch="$(git log -1 --format=%ct)"
          targets='shell:linux:amd64:x64 shell:linux:arm64:arm64 shell:darwin:amd64:x64 shell:darwin:arm64:arm64 shell:windows:amd64:x64 console:linux:amd64:x64 console:linux:arm64:arm64 console:darwin:amd64:x64 console:darwin:arm64:arm64 console:windows:amd64:x64'
          for entry in $targets; do
            IFS=: read -r kind os arch bunArch <<EOF
          ${entry}
          EOF
            ext=''
            [ "$os" = windows ] && ext='.exe'
            case "$kind" in
              shell) srcDir=apps/runtime/dist; srcBase=caracal; binName=caracal ;;
              console) srcDir=apps/console/dist; srcBase=caracal-console; binName=caracal-console ;;
            esac
            src="${srcDir}/${srcBase}-${os}-${bunArch}${ext}"
            [ -f "$src" ] || { echo "::error::missing source binary: ${src}"; exit 1; }
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}${ext}"
            chmod +x "${stage}/${binName}${ext}" 2>/dev/null || true
            touch -d "@${source_date_epoch}" "${stage}/${binName}${ext}"
            name="caracal-${kind}-${os}-${arch}-${RELEASE_TAG}"
            if [ "$os" = windows ]; then
              (cd "$stage" && TZ=UTC zip -X -q "${name}.zip" "${binName}${ext}")
              mv "${stage}/${name}.zip" release-dist/
            else
              tar --sort=name --owner=0 --group=0 --numeric-owner --mtime="@${source_date_epoch}" -C "$stage" -cf - "${binName}" | gzip -n -9 > "release-dist/${name}.tar.gz"
            fi
            rm -rf "$stage"
          done
          cp "releases/${RELEASE_TAG}/manifest.json" release-dist/manifest.json
          cp install-console.sh install-console.ps1 release-dist/
          ls -la release-dist/

      - name: Verify reproducibility
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          source_date_epoch="$(git log -1 --format=%ct)"
          for entry in shell:apps/runtime/dist:caracal console:apps/console/dist:caracal-console; do
            IFS=: read -r kind srcDir binName <<EOF
          ${entry}
          EOF
            src="${srcDir}/${binName}-linux-x64"
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}"
            chmod +x "${stage}/${binName}"
            touch -d "@${source_date_epoch}" "${stage}/${binName}"
            archive="${stage}/caracal-${kind}-linux-amd64-${RELEASE_TAG}.tar.gz"
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime="@${source_date_epoch}" -C "$stage" -cf - "${binName}" | gzip -n -9 > "$archive"
            cmp "$archive" "release-dist/caracal-${kind}-linux-amd64-${RELEASE_TAG}.tar.gz"
            rm -rf "$stage"
          done

      - name: Smoke test archives
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          tar -xzf "release-dist/caracal-shell-linux-amd64-${RELEASE_TAG}.tar.gz" -C "$work"
          "${work}/caracal" --help
          tar -xzf "release-dist/caracal-console-linux-amd64-${RELEASE_TAG}.tar.gz" -C "$work"
          "${work}/caracal-console" --help
          console_exit=0
          "${work}/caracal-console" 2>/tmp/console-stderr || console_exit=$?
          console_msg="$(cat /tmp/console-stderr)"
          [ "$console_exit" = "1" ] || { echo "::error::Console exited with code ${console_exit} (expected 1)"; exit 1; }
          echo "$console_msg" | grep -q "not a TTY" || { echo "::error::Console missing expected no-TTY message; got: ${console_msg}"; exit 1; }

      - name: Generate checksums
        working-directory: release-dist
        run: sha256sum caracal-shell-*.tar.gz caracal-shell-*.zip caracal-console-*.tar.gz caracal-console-*.zip manifest.json install-console.sh install-console.ps1 > SHA256SUMS

      - name: Verify assets
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: node scripts/verifyReleaseAssets.mjs "$RELEASE_TAG" release-dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-archives
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: needs.context.outputs.publish == 'true'
        with:
          subject-path: |
            release-dist/caracal-shell-*
            release-dist/caracal-console-*

  serviceImages:
    name: Build service images
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - name: sts
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=sts
              PORT=8080
              STATE_DIRS=audit-replay
          - name: gateway
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=gateway
              PORT=8081
          - name: audit
            context: .
            dockerfile: infra/docker/Dockerfile.go-service
            build_args: |
              SERVICE=audit
              PORT=9090
          - name: coordinator
            context: .
            dockerfile: apps/coordinator/Dockerfile
            build_args: ""
          - name: control
            context: .
            dockerfile: apps/control/Dockerfile
            build_args: ""
          - name: postgres
            context: infra/postgres
            dockerfile: infra/postgres/Dockerfile
            build_args: ""
          - name: redis
            context: infra/redis
            dockerfile: infra/redis/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.context.outputs.checkoutRef }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: type=raw,value=${{ needs.context.outputs.releaseTag }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.context.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  runtimeImage:
    name: Build runtime image
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.context.outputs.checkoutRef }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-runtime
          tags: type=raw,value=${{ needs.context.outputs.releaseTag }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            CARACAL_RELEASE_VERSION=${{ needs.context.outputs.version }}
            CARACAL_DEV_SHA=${{ needs.context.outputs.sha }}
          push: ${{ needs.context.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

  verifyAssets:
    name: Verify assets
    needs: [context, archives]
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.context.outputs.checkoutRef }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-archives
          path: dist

      - name: Verify release assets
        run: node scripts/verifyReleaseAssets.mjs "${{ needs.context.outputs.releaseTag }}" dist

  publishNpmPackages:
    name: Publish npm packages
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    uses: ./.github/workflows/publishNpm.yml
    with:
      package: changed
      baseRef: ''
      dryRun: ${{ needs.context.outputs.dryRun == 'true' }}
      runner: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  publishPypiPackages:
    name: Publish PyPI packages
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch PyPI publisher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ needs.context.outputs.checkoutRef }}
          REF_NAME: ${{ needs.context.outputs.releaseTag }}
          DRY_RUN: ${{ needs.context.outputs.dryRun }}
        run: |
          set -euo pipefail
          if [[ "$REF_NAME" == refs/* ]]; then
            ref_name="${REF_NAME##*/}"
          fi
          if [[ -z "${ref_name:-}" ]]; then
            ref_name="${REF#refs/tags/}"
            ref_name="${ref_name#refs/heads/}"
          fi
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run publishPypi.yml \
            --ref "$REF" \
            --field package=changed \
            --field baseRef='' \
            --field dryRun="$DRY_RUN" \
            --field runner=ubuntu-24.04
          deadline=$((SECONDS + 300))
          run_id=''
          while [[ -z "$run_id" && $SECONDS -lt $deadline ]]; do
            sleep 5
            run_id="$(gh run list \
              --workflow publishPypi.yml \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt,headBranch \
              --jq '.[] | select(.headBranch == "'"$ref_name"'" and .createdAt >= "'"$started"'") | .databaseId' | head -n 1)"
          done
          if [[ -z "$run_id" ]]; then
            echo "::error::Timed out waiting for publishPypi.yml dispatch to appear."
            exit 1
          fi
          gh run watch "$run_id" --exit-status

  githubRelease:
    name: Publish GitHub Release
    needs: [context, verifyAssets, serviceImages, runtimeImage, publishNpmPackages, publishPypiPackages]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ needs.context.outputs.channel == 'rc' && 'rc-release' || 'release-approval' }}
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.context.outputs.releaseTag }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-archives
          path: dist

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.context.outputs.releaseTag }}
          generate_release_notes: true
          prerelease: ${{ needs.context.outputs.channel == 'rc' }}
          fail_on_unmatched_files: true
          files: |
            dist/caracal-shell-*
            dist/caracal-console-*
            dist/manifest.json
            dist/SHA256SUMS
            dist/install-console.sh
            dist/install-console.ps1

  dryRunSummary:
    name: Dry-run summary
    needs: [context, verifyAssets, serviceImages, runtimeImage, publishNpmPackages, publishPypiPackages]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.dryRun == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - run: |
          {
            echo "## Release dry-run"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Release | \`${{ needs.context.outputs.releaseTag }}\` |"
            echo "| Channel | \`${{ needs.context.outputs.channel }}\` |"
            echo "| Published | \`false\` |"
            echo ""
            echo "Built and verified assets. Publishing, validation, and promotion were skipped."
          } >> "$GITHUB_STEP_SUMMARY"

  postValidate:
    name: Validate published release
    needs: [context, githubRelease]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.publish == 'true'
    uses: ./.github/workflows/postReleaseValidation.yml
    with:
      release: ${{ needs.context.outputs.releaseTag }}
    permissions:
      contents: write
      packages: read
      attestations: read
      pull-requests: write
    secrets: inherit

  promoteStable:
    name: Promote stable tags
    needs: [context, postValidate]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.promoteStable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote images
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          series="${RELEASE_TAG:0:8}"
          images=(api coordinator control audit gateway sts postgres redis runtime)
          for name in "${images[@]}"; do
            image="${REGISTRY}/${IMAGE_OWNER}/caracal-${name}"
            docker buildx imagetools create \
              -t "${image}:${series}" \
              -t "${image}:latest" \
              "${image}:${RELEASE_TAG}"
          done
