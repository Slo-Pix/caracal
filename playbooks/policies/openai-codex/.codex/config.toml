# Codex configuration guidance for the Caracal policy authoring playbook.

[workflow]
principle = "Understand first. Write data second."
policy_generation_requires_clear_requirements = true
policy_updates_require_current_behavior_review = true
prefer_simplest_safe_policy_shape = true
explain_tradeoffs_before_complex_data = true

[documentation]
priority = [
  "https://docs.caracal.run",
  "Caracal policy documentation and schemas",
  "official OPA/Rego documentation",
  "connected documentation MCPs",
  "repository guidance"
]
rule = "Documentation and supplied policy input override memory and assumptions."

[mcp]
purpose = "Use documentation MCP servers so Codex can retrieve current Caracal policy, schema, and OPA documentation before writing or reviewing policies."
use_when = [
  "policy input fields are unclear",
  "Caracal decision contract must be verified",
  "OPA/Rego syntax or semantics must be checked",
  "policy-set simulation or activation guidance depends on documentation"
]
recommended_servers = ["Context7", "Caracal documentation MCPs", "OPA documentation MCPs", "internal documentation MCPs"]

[mcp.context7]
enabled_by_default = false
server = "https://mcp.context7.com/mcp"
note = "Enable when the Codex environment supports MCP and direct documentation lookup."

[approval]
network_access = "ask or follow workspace policy"
file_changes = "only after requirement discovery and input verification"
secret_handling = "never output usable credentials"
unsupported_cases = "explain the limitation and provide an issue-report path"

[safety]
docs_first = true
mask_secrets = true
deny_by_default = true
deterministic_rego_only = true
no_provider_dashboard_mapping = true
no_sdk_integration = true
response_style = "short, direct, policy-focused, documentation-backed"
never_invent_unsupported_capabilities = true
prefer_plain_language_explanations = true
