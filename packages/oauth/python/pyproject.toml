[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-oauth"
version = "0.1.5rc3"
description = "Caracal RFC 8693 token exchange client with safe in-memory caching"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "idna>=3.15",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_oauth"]
