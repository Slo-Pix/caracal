# Python package metadata for MCP transport authentication.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-transport-mcp"
version = "0.1.5rc1"
description = "Transport-neutral MCP authentication for Caracal-issued JWTs"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-identity==0.1.5rc1",
  "caracalai-revocation==0.1.5rc1",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_transport_mcp"]
