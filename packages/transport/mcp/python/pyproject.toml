[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-transport-mcp"
version = "0.1.0"
description = "Transport-neutral MCP authentication for Caracal-issued JWTs"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "caracalai-identity",
  "caracalai-revocation",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_transport_mcp"]
