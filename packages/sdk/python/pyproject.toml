# Python package metadata for the Caracal SDK.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-sdk"
version = "0.1.5rc3"
description = "Caracal agent identity and delegation SDK: context propagation, spawn, delegate, transport hooks"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "idna>=3.15",
  "caracalai-identity==0.1.5rc3",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai"]
