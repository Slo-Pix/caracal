[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-mcp-fastmcp"
version = "0.1.1"
description = "FastMCP adapter for Caracal MCP authentication"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "caracalai-transport-mcp",
  "caracalai-revocation",
]

[project.optional-dependencies]
fastmcp = ["fastmcp>=3.2.4"]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_mcp_fastmcp"]
