#
# Python package metadata for the FastMCP connector.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-mcp-fastmcp"
version = "0.1.5rc3"
description = "FastMCP adapter for Caracal MCP authentication"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-transport-mcp==0.1.5rc3",
  "caracalai-revocation==0.1.5rc3",
]

[project.optional-dependencies]
fastmcp = ["fastmcp>=3.4.2"]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_mcp_fastmcp"]
