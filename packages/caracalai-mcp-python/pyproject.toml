[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-mcp"
version = "0.1.0"
description = "Caracal MCP auth middleware for Python FastMCP servers"
requires-python = ">=3.11"
dependencies = [
  "PyJWT>=2.10.0",
  "httpx>=0.28.0",
]

[project.optional-dependencies]
fastmcp = ["fastmcp>=0.4.0"]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_mcp"]
