[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-identity"
version = "0.1.1"
description = "Caracal JWT verification, JWKS cache, scope evaluation, and claim shapes"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "caracalai-core",
  "PyJWT>=2.10.0",
  "httpx>=0.28.0",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_identity"]
